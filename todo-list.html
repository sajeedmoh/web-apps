<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <script>if (!localStorage.getItem('auth_session')) window.location.replace('login.html');</script>
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    rgba(255,255,255,0.08);
      --accent:    #6c8ef7;
      --accent-h:  #8aa4ff;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --done-col:  #4b5563;
      --danger:    #ef4444;
      --success:   #22c55e;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 72px 16px 40px;
    }

    /* ── Back bar ─────────────────────────────────── */
    .back-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(15,17,23,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      height: 48px;
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.18s;
    }
    .back-link:hover { color: var(--text); }

    /* ── App card ─────────────────────────────────── */
    .app {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 560px;
      padding: 28px;
      height: fit-content;
    }

    .app-header {
      margin-bottom: 24px;
    }

    .app-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }

    .app-header .subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Input row ────────────────────────────────── */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .input-row input {
      flex: 1;
      padding: 11px 14px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input::placeholder { color: var(--muted); }
    .input-row input:focus { border-color: var(--accent); }

    .btn-add {
      padding: 11px 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-add:hover { background: var(--accent-h); }
    .btn-add:active { transform: scale(0.97); }
    .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Filters ──────────────────────────────────── */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
    }

    .filter-btn {
      padding: 5px 14px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: none;
      font-size: 0.82rem;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Task list ────────────────────────────────── */
    .task-list { list-style: none; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 10px;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item:last-child { border-bottom: none; }

    .task-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--accent);
      flex-shrink: 0;
    }

    .task-text {
      flex: 1;
      font-size: 0.95rem;
      color: var(--text);
      word-break: break-word;
      line-height: 1.4;
    }

    .task-text.done {
      text-decoration: line-through;
      color: var(--done-col);
    }

    .task-edit-input {
      flex: 1;
      padding: 6px 10px;
      background: var(--bg);
      border: 1.5px solid var(--accent);
      border-radius: 8px;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
    }

    .task-actions { display: flex; gap: 4px; flex-shrink: 0; }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px 7px;
      border-radius: 7px;
      font-size: 1rem;
      line-height: 1;
      transition: background 0.15s;
      color: var(--muted);
    }

    .icon-btn:hover { background: rgba(255,255,255,0.07); }
    .icon-btn.save   { color: var(--success); }
    .icon-btn.edit   { color: var(--accent); }
    .icon-btn.delete { color: var(--danger); }
    .icon-btn.cancel { color: var(--muted); }

    /* ── Empty state ──────────────────────────────── */
    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 36px 0;
    }

    /* ── Loading / error ──────────────────────────── */
    .status-msg {
      text-align: center;
      font-size: 0.85rem;
      padding: 20px 0;
      color: var(--muted);
    }

    .error-msg {
      color: var(--danger);
      font-size: 0.82rem;
      margin-bottom: 10px;
      padding: 8px 12px;
      background: rgba(239,68,68,0.1);
      border-radius: 8px;
      display: none;
    }

    /* ── Footer ───────────────────────────────────── */
    .footer {
      margin-top: 16px;
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 0.8rem;
      cursor: pointer;
      opacity: 0.8;
    }

    .clear-btn:hover { opacity: 1; text-decoration: underline; }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 480px) {
      body { padding: 64px 12px 24px; }
      .app { padding: 20px 16px; }
      .input-row { flex-direction: column; }
      .btn-add { width: 100%; }
      .filter-btn { padding: 5px 10px; font-size: 0.8rem; }
      .icon-btn { padding: 6px 8px; font-size: 1.05rem; }
      .task-item { padding: 12px 6px; }
    }
  </style>
</head>
<body>
  <nav class="back-bar">
    <a href="dashboard.html" class="back-link">
      <span>&#8592;</span> Back to Dashboard
    </a>
  </nav>

  <div class="app">
    <div class="app-header">
      <h1>To-Do List</h1>
      <div class="subtitle" id="greeting"></div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task..." maxlength="200" />
      <button class="btn-add" id="addBtn">Add</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="done">Done</button>
    </div>

    <ul class="task-list" id="taskList">
      <li class="status-msg">Loading tasks...</li>
    </ul>

    <div class="footer">
      <span id="taskCount"></span>
      <button class="clear-btn" id="clearDoneBtn">Clear completed</button>
    </div>
  </div>

  <script>
    const session = JSON.parse(localStorage.getItem('auth_session') || 'null');
    if (!session) window.location.replace('login.html');

    const token   = localStorage.getItem('auth_token');
    const BASE    = window.API_BASE;
    const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };

    let tasks  = [];
    let filter = 'all';
    let busy   = false; // prevent double-submit

    // ── Greeting ─────────────────────────────────────
    const name = session.firstName || session.email.split('@')[0];
    document.getElementById('greeting').textContent = `Hello, ${name}`;

    // ── Error helper ──────────────────────────────────
    const errorEl = document.getElementById('errorMsg');
    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      setTimeout(() => { errorEl.style.display = 'none'; }, 4000);
    }

    // ── API helpers ───────────────────────────────────
    async function apiFetch(path, opts = {}) {
      const res = await fetch(BASE + path, { headers, ...opts });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || `HTTP ${res.status}`);
      }
      return res.json();
    }

    // ── Load tasks ────────────────────────────────────
    async function loadTasks() {
      try {
        const data = await apiFetch('/api/todos');
        tasks = data.tasks || [];
        render();
      } catch (e) {
        document.getElementById('taskList').innerHTML =
          '<li class="status-msg" style="color:#ef4444">Failed to load tasks.</li>';
      }
    }

    // ── Render ────────────────────────────────────────
    function render() {
      const filtered = tasks.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done')   return t.done;
        return true;
      });

      const taskList = document.getElementById('taskList');
      taskList.innerHTML = '';

      if (filtered.length === 0) {
        taskList.innerHTML = '<li class="empty">No tasks here.</li>';
      } else {
        filtered.forEach(t => taskList.appendChild(buildItem(t)));
      }

      const remaining = tasks.filter(t => !t.done).length;
      document.getElementById('taskCount').textContent =
        `${remaining} task${remaining !== 1 ? 's' : ''} left`;
    }

    function buildItem(task) {
      const li = document.createElement('li');
      li.className = 'task-item';
      li.dataset.id = task.id;

      if (task._editing) {
        const input = document.createElement('input');
        input.className = 'task-edit-input';
        input.value = task.text;
        input.maxLength = 200;

        const saveBtn = document.createElement('button');
        saveBtn.className = 'icon-btn save';
        saveBtn.title = 'Save';
        saveBtn.textContent = '✓';
        saveBtn.onclick = () => commitEdit(task.id, input.value);

        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'icon-btn cancel';
        cancelBtn.title = 'Cancel';
        cancelBtn.textContent = '✕';
        cancelBtn.onclick = () => cancelEdit(task.id);

        input.onkeydown = e => {
          if (e.key === 'Enter')  commitEdit(task.id, input.value);
          if (e.key === 'Escape') cancelEdit(task.id);
        };

        const actions = document.createElement('div');
        actions.className = 'task-actions';
        actions.append(saveBtn, cancelBtn);
        li.append(input, actions);
        setTimeout(() => { input.focus(); input.select(); }, 0);
      } else {
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.className = 'task-checkbox';
        cb.checked = task.done;
        cb.onchange = () => toggleDone(task.id);

        const span = document.createElement('span');
        span.className = 'task-text' + (task.done ? ' done' : '');
        span.textContent = task.text;
        span.ondblclick = () => startEdit(task.id);

        const editBtn = document.createElement('button');
        editBtn.className = 'icon-btn edit';
        editBtn.title = 'Edit';
        editBtn.innerHTML = '&#9998;';
        editBtn.onclick = () => startEdit(task.id);

        const delBtn = document.createElement('button');
        delBtn.className = 'icon-btn delete';
        delBtn.title = 'Delete';
        delBtn.textContent = '🗑';
        delBtn.onclick = () => deleteTask(task.id);

        const actions = document.createElement('div');
        actions.className = 'task-actions';
        actions.append(editBtn, delBtn);
        li.append(cb, span, actions);
      }

      return li;
    }

    // ── Actions ───────────────────────────────────────
    async function addTask() {
      const input = document.getElementById('taskInput');
      const text  = input.value.trim();
      if (!text || busy) return;
      busy = true;
      document.getElementById('addBtn').disabled = true;
      try {
        const data = await apiFetch('/api/todos', {
          method: 'POST',
          body: JSON.stringify({ text })
        });
        tasks.unshift(data.task);
        input.value = '';
        render();
      } catch (e) {
        showError('Failed to add task: ' + e.message);
      } finally {
        busy = false;
        document.getElementById('addBtn').disabled = false;
      }
    }

    async function toggleDone(id) {
      const t = tasks.find(t => t.id === id);
      if (!t) return;
      const newDone = !t.done;
      t.done = newDone; // optimistic
      render();
      try {
        await apiFetch(`/api/todos/${id}`, {
          method: 'PUT',
          body: JSON.stringify({ done: newDone })
        });
      } catch (e) {
        t.done = !newDone; // revert
        render();
        showError('Failed to update task.');
      }
    }

    async function deleteTask(id) {
      const prev = [...tasks];
      tasks = tasks.filter(t => t.id !== id); // optimistic
      render();
      try {
        await apiFetch(`/api/todos/${id}`, { method: 'DELETE' });
      } catch (e) {
        tasks = prev; // revert
        render();
        showError('Failed to delete task.');
      }
    }

    function startEdit(id) {
      tasks.forEach(t => t._editing = false);
      const t = tasks.find(t => t.id === id);
      if (t) { t._editing = true; render(); }
    }

    async function commitEdit(id, value) {
      const text = value.trim();
      if (!text) return;
      const t = tasks.find(t => t.id === id);
      if (!t) return;
      const prev = t.text;
      t.text = text;
      t._editing = false;
      render();
      try {
        await apiFetch(`/api/todos/${id}`, {
          method: 'PUT',
          body: JSON.stringify({ text })
        });
      } catch (e) {
        t.text = prev; // revert
        render();
        showError('Failed to save edit.');
      }
    }

    function cancelEdit(id) {
      const t = tasks.find(t => t.id === id);
      if (t) { t._editing = false; render(); }
    }

    async function clearDone() {
      const doneTasks = tasks.filter(t => t.done);
      if (doneTasks.length === 0) return;
      const prev = [...tasks];
      tasks = tasks.filter(t => !t.done); // optimistic
      render();
      try {
        await Promise.all(doneTasks.map(t =>
          apiFetch(`/api/todos/${t.id}`, { method: 'DELETE' })
        ));
      } catch (e) {
        tasks = prev; // revert
        render();
        showError('Failed to clear completed tasks.');
      }
    }

    // ── Event listeners ───────────────────────────────
    document.getElementById('addBtn').onclick = addTask;
    document.getElementById('taskInput').onkeydown = e => { if (e.key === 'Enter') addTask(); };
    document.getElementById('clearDoneBtn').onclick = clearDone;

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.onclick = () => {
        filter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      };
    });

    // ── Init ──────────────────────────────────────────
    loadTasks();
  </script>
  <script src="session-guard.js"></script>
</body>
</html>
