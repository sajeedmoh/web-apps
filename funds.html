<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Funds – Money Manager</title>
  <script>if (!localStorage.getItem('auth_session')) window.location.replace('login.html');</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:            #f4f5f7;
      --surface:       #ffffff;
      --surface2:      #f0f1f4;
      --border:        rgba(0,0,0,0.09);
      --text:          #1a1a2e;
      --muted:         rgba(0,0,0,0.42);
      --accent:        #8b5cf6;
      --accent-bg:     rgba(139,92,246,0.10);
      --accent-border: rgba(139,92,246,0.30);
      --green:         #16a34a;
      --green-bg:      rgba(22,163,74,0.10);
      --red:           #dc2626;
      --red-bg:        rgba(220,38,38,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 44px 0 88px;
    }

    /* ── Back bar ── */
    .back-bar {
      position: fixed;
      top: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      z-index: 100;
      background: rgba(244,245,247,0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      border-radius: 0 0 16px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 44px;
    }
    .back-link {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.82rem; color: var(--muted);
      text-decoration: none; transition: color 0.18s;
    }
    .back-link:hover { color: var(--accent); }
    .back-bar-title { font-size: 0.88rem; font-weight: 600; }

    /* ── Page wrap ── */
    .page-wrap { max-width: 480px; margin: 0 auto; padding: 0 16px; }

    /* ── Month nav ── */
    .month-nav {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; padding: 12px 0 4px;
    }
    .month-nav-btn {
      background: none; border: none; color: var(--muted);
      font-size: 1.2rem; cursor: pointer; padding: 4px 10px;
      border-radius: 6px; transition: color 0.15s, background 0.15s; line-height: 1;
    }
    .month-nav-btn:hover { color: var(--accent); background: var(--accent-bg); }
    .month-nav-label { font-size: 0.9rem; font-weight: 600; min-width: 130px; text-align: center; }

    /* ── Tab bar (bottom nav) ── */
    .tab-bar {
      position: fixed; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      z-index: 100; display: flex;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 6px 0 max(10px, env(safe-area-inset-bottom));
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      padding: 6px 4px;
      border: none; background: none;
      font-size: 0.62rem; font-weight: 600; letter-spacing: 0.01em;
      color: var(--muted); cursor: pointer;
      transition: color 0.15s; font-family: inherit; line-height: 1;
    }
    .tab-btn .tab-icon { font-size: 1.4rem; line-height: 1; }
    .tab-btn.active { color: var(--accent); }

    /* ── Section title ── */
    .section-title {
      font-size: 0.68rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 10px; padding-left: 2px;
    }

    /* ── Transactions ── */
    .txn-group { margin-bottom: 14px; }
    .txn-date-label { font-size: 0.67rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 0 4px 8px; }
    .txn-row {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 11px 13px;
      display: flex; align-items: center; gap: 11px;
      margin-bottom: 6px; transition: background 0.15s;
    }
    .txn-row:hover { background: var(--surface2); }
    .txn-cat-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
    .txn-info { flex: 1; min-width: 0; }
    .txn-title { font-size: 0.87rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .txn-sub   { font-size: 0.71rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .txn-amount { font-size: 0.92rem; font-weight: 700; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .txn-amount.income  { color: var(--green); }
    .txn-amount.expense { color: var(--red); }
    .txn-row { cursor: pointer; }
    .txn-chevron { font-size: 0.7rem; color: rgba(0,0,0,0.18); flex-shrink: 0; }

    /* ── Wallet list (Spendee style) ── */
    .wallet-list { display: flex; flex-direction: column; background: var(--surface); border-radius: 14px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 16px; }
    .wallet-list-item { display: flex; align-items: center; gap: 13px; padding: 13px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; }
    .wallet-list-item:last-child { border-bottom: none; }
    .wallet-list-item:active { background: var(--surface2); }
    .wallet-list-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; flex-shrink: 0; }
    .wallet-list-info { flex: 1; min-width: 0; }
    .wallet-list-name { font-size: 0.92rem; font-weight: 600; color: var(--text); }
    .wallet-list-balance { font-size: 0.78rem; font-weight: 600; font-variant-numeric: tabular-nums; margin-top: 2px; }
    .wallet-eye-btn { width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; transition: transform 0.15s; background: var(--accent); color: #fff; }
    .wallet-eye-btn:active { transform: scale(0.92); }

    /* ── Detail sheet ── */
    .detail-icon-wrap { width: 64px; height: 64px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 12px; }
    .detail-amount { font-size: 2rem; font-weight: 800; font-variant-numeric: tabular-nums; text-align: center; margin-bottom: 4px; letter-spacing: -0.02em; }
    .detail-meta { font-size: 0.8rem; color: var(--muted); text-align: center; margin-bottom: 20px; }
    .detail-rows { background: rgba(0,0,0,0.03); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    .detail-row:last-child { border-bottom: none; }
    .detail-row-label { color: var(--muted); }
    .detail-row-value { font-weight: 500; text-align: right; }
    .btn-danger { width: 100%; padding: 12px; background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25); border-radius: 9px; color: var(--red); font-size: 0.92rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: background 0.15s; margin-top: 4px; }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .btn-cancel-link { width: 100%; margin-top: 8px; padding: 10px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.88rem; font-family: inherit; }

    /* ── Add wallet form ── */
    .add-wallet-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 4px; }
    .add-wallet-title { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

    /* ── Form fields ── */
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
    .field input, .field select {
      width: 100%; padding: 10px 12px;
      background: rgba(0,0,0,0.04); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text); font-size: 0.9rem;
      font-family: inherit; outline: none; transition: border-color 0.15s;
      appearance: none; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field input::placeholder { color: rgba(0,0,0,0.25); }
    .field select option { background: #ffffff; color: #1a1a2e; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Color picker */
    .color-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-swatch { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.15s, border-color 0.15s; }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: #333; transform: scale(1.1); }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%; padding: 12px; background: var(--accent); border: none;
      border-radius: 9px; color: #fff; font-size: 0.92rem; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: filter 0.15s, transform 0.1s; margin-top: 4px;
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 24px; right: 24px;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent); border: none; color: #fff;
      font-size: 1.7rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(139,92,246,0.45);
      z-index: 50; transition: transform 0.2s, box-shadow 0.2s; line-height: 1;
    }
    .fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(139,92,246,0.55); }

    /* ── Modal (bottom sheet) ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 200; display: none; align-items: flex-end; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal-sheet {
      background: #ffffff; border-radius: 20px 20px 0 0;
      width: 100%; max-width: 480px; padding: 16px 20px 32px;
      max-height: 92vh; overflow-y: auto;
      animation: slideUp 0.28s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 36px; height: 4px; background: rgba(0,0,0,0.12); border-radius: 99px; margin: 0 auto 16px; }
    .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 16px; text-align: center; }

    /* Type toggle */
    .type-toggle { display: flex; background: rgba(0,0,0,0.05); border-radius: 10px; padding: 4px; gap: 4px; margin-bottom: 14px; }
    .type-toggle-btn { flex: 1; padding: 9px 4px; border: none; border-radius: 7px; font-size: 0.8rem; font-weight: 600; font-family: inherit; cursor: pointer; background: none; color: var(--muted); transition: all 0.15s; white-space: nowrap; }
    .type-toggle-btn.active-income   { background: rgba(34,197,94,0.15);  color: var(--green); }
    .type-toggle-btn.active-expense  { background: rgba(239,68,68,0.12);  color: var(--red); }
    .type-toggle-btn.active-transfer { background: rgba(34,197,94,0.15);  color: var(--green); }

    /* Transfer wallet selectors inside modal */
    .transfer-wallets {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }
    .transfer-wallets.visible { display: flex; }
    .transfer-wallet-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(34,197,94,0.07);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 10px;
      padding: 10px 14px;
    }
    .transfer-wallet-row label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #22c55e;
      min-width: 36px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .transfer-wallet-row select {
      flex: 1;
      border: none;
      background: none;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      font-family: inherit;
      outline: none;
    }

    /* Amount input */
    .amount-input-wrap {
      display: flex; align-items: center; gap: 8px;
      background: rgba(0,0,0,0.04); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 16px; margin-bottom: 14px; transition: border-color 0.15s;
    }
    .amount-input-wrap:focus-within { border-color: var(--accent); }
    .amount-currency { font-size: 1.4rem; font-weight: 700; color: var(--muted); flex-shrink: 0; }
    .amount-input { flex: 1; background: none; border: none; outline: none; font-size: 1.8rem; font-weight: 700; color: var(--text); font-family: inherit; font-variant-numeric: tabular-nums; min-width: 0; }
    .amount-input::placeholder { color: rgba(0,0,0,0.2); }

    /* Category grid */
    .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 14px; }
    .cat-pick { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 4px; border-radius: 10px; border: 1px solid transparent; cursor: pointer; transition: background 0.15s, border-color 0.15s; background: none; font-family: inherit; color: var(--text); }
    .cat-pick:hover { background: rgba(0,0,0,0.05); }
    .cat-pick.selected { background: var(--accent-bg); border-color: var(--accent-border); }
    .cat-pick-icon { font-size: 1.25rem; }
    .cat-pick-name { font-size: 0.6rem; color: var(--muted); text-align: center; line-height: 1.2; }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 36px 24px; color: var(--muted); font-size: 0.88rem; border: 1px dashed rgba(0,0,0,0.12); border-radius: 14px; }
    .empty-state .icon { font-size: 2rem; margin-bottom: 8px; }

    /* ── Tabs ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Icon picker ── */
    .icon-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; margin-top: 2px; max-height: 220px; overflow-y: auto; padding-right: 2px; }
    .icon-pick { display: flex; align-items: center; justify-content: center; height: 36px; border-radius: 8px; border: 1px solid transparent; background: rgba(0,0,0,0.04); cursor: pointer; font-size: 1.15rem; transition: background 0.12s, border-color 0.12s; }
    .icon-pick:hover { background: rgba(0,0,0,0.08); }
    .icon-pick.selected { background: var(--accent-bg); border-color: var(--accent-border); }

    /* ── Category list (Spendee style) ── */
    .cat-list { display: flex; flex-direction: column; }
    .cat-list-item { display: flex; align-items: center; gap: 14px; padding: 12px 4px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; }
    .cat-list-item:last-child { border-bottom: none; }
    .cat-list-item:active { background: var(--surface); }
    .cat-circle { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.35rem; flex-shrink: 0; }
    .cat-info { flex: 1; min-width: 0; }
    .cat-name { font-size: 0.92rem; font-weight: 600; color: var(--text); }
    .cat-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .cat-drag { color: rgba(0,0,0,0.2); font-size: 1rem; flex-shrink: 0; letter-spacing: -1px; }
    /* Pill-style toggle for categories */
    .cat-type-toggle { display: flex; background: rgba(0,0,0,0.07); border-radius: 50px; padding: 3px; gap: 0; margin-bottom: 16px; }
    .cat-type-btn { flex: 1; padding: 9px; border: none; border-radius: 50px; font-size: 0.88rem; font-weight: 600; font-family: inherit; cursor: pointer; background: none; color: var(--muted); transition: all 0.2s; }
    .cat-type-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.35); }
    /* ── More menu items ── */
    .more-section-title {
      font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); padding: 16px 2px 8px; font-weight: 600;
    }
    .more-menu-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 8px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .more-menu-item:hover { background: var(--surface2); border-color: rgba(139,92,246,0.25); }
    .more-menu-icon {
      width: 42px; height: 42px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem; flex-shrink: 0;
    }
    .more-menu-info { flex: 1; min-width: 0; }
    .more-menu-name { font-size: 0.9rem; font-weight: 600; }
    .more-menu-meta { font-size: 0.71rem; color: var(--muted); margin-top: 2px; }
    .more-menu-chevron { font-size: 0.85rem; color: rgba(0,0,0,0.2); flex-shrink: 0; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .page-wrap { padding: 0 12px; }
    }
  </style>
</head>
<body>

<nav class="back-bar">
  <a href="dashboard.html" class="back-link">&#8592; Dashboard</a>
  <span class="back-bar-title">&#128176; Funds</span>
  <div style="width:80px"></div>
</nav>

<div class="page-wrap">

  <!-- Month navigation -->
  <div class="month-nav">
    <button class="month-nav-btn" onclick="shiftMonth(-1)">&#8249;</button>
    <span class="month-nav-label" id="monthLabel">—</span>
    <button class="month-nav-btn" onclick="shiftMonth(1)">&#8250;</button>
  </div>

  <!-- Overview tab -->
  <div id="tab-overview" class="tab-panel">
    <!-- Filters row -->
    <div style="display:flex;gap:8px;padding:12px 0 8px;align-items:center">
      <select id="ovWalletFilter" onchange="renderOverview()" style="flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:0.82rem;font-family:inherit;outline:none">
        <option value="all">All Wallets</option>
      </select>
      <select id="ovPeriodFilter" onchange="renderOverview()" style="flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:0.82rem;font-family:inherit;outline:none">
        <option value="month">By Month</option>
        <option value="year">By Year</option>
        <option value="all">All Time</option>
      </select>
    </div>
    <!-- Month nav (hidden when period=all) -->
    <div id="ovMonthNav" style="display:flex;align-items:center;justify-content:center;gap:12px;padding:4px 0 10px">
      <button onclick="ovShiftMonth(-1)" style="background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:4px 10px;border-radius:6px;line-height:1">&#8249;</button>
      <span id="ovMonthLabel" style="font-size:0.9rem;font-weight:600;min-width:130px;text-align:center"></span>
      <button onclick="ovShiftMonth(1)" style="background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:4px 10px;border-radius:6px;line-height:1">&#8250;</button>
    </div>
    <!-- Summary cards -->
    <div id="ovSummary"></div>
    <!-- Type toggle (expense / income) -->
    <div class="type-toggle" style="margin-bottom:14px">
      <button class="type-toggle-btn active-expense" id="ovBtnExpense" onclick="setOvType('expense')">&#8595; Expenses</button>
      <button class="type-toggle-btn" id="ovBtnIncome" onclick="setOvType('income')">&#8593; Income</button>
    </div>
    <!-- Donut chart -->
    <div id="ovChart" style="position:relative;display:flex;justify-content:center;margin-bottom:16px"></div>
    <!-- Category list -->
    <div style="font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding-left:2px">Categories</div>
    <div id="ovCatList"></div>
  </div>

  <!-- Wallets tab -->
  <div id="tab-wallets" class="tab-panel active">
    <div id="walletList"></div>
  </div>

  <!-- Timeline tab -->
  <div id="tab-transactions" class="tab-panel">
    <div class="empty-state" style="margin-top:40px">
      <div class="icon">💳</div>
      Coming soon — timeline view
    </div>
  </div>

  <!-- More tab -->
  <div id="tab-more" class="tab-panel">
    <p class="more-section-title">Manage</p>
    <div class="more-menu-item" onclick="openMorePanel('wallets')">
      <div class="more-menu-icon" style="background:rgba(139,92,246,0.14)">👛</div>
      <div class="more-menu-info">
        <div class="more-menu-name">Wallets</div>
        <div class="more-menu-meta" id="moreWalletsMeta">—</div>
      </div>
      <span class="more-menu-chevron">&#8250;</span>
    </div>
    <div class="more-menu-item" onclick="openMorePanel('categories')">
      <div class="more-menu-icon" style="background:rgba(34,197,94,0.12)">🏷️</div>
      <div class="more-menu-info">
        <div class="more-menu-name">Categories</div>
        <div class="more-menu-meta" id="moreCatsMeta">—</div>
      </div>
      <span class="more-menu-chevron">&#8250;</span>
    </div>
    <div class="more-menu-item" onclick="openMorePanel('labels')">
      <div class="more-menu-icon" style="background:rgba(59,130,246,0.12)">🔖</div>
      <div class="more-menu-info">
        <div class="more-menu-name">Labels</div>
        <div class="more-menu-meta" id="moreLabelsMeta">—</div>
      </div>

<script src="config.js"></script>
<script>
  const token    = localStorage.getItem('auth_token');
  const API_BASE = window.API_BASE || '';

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
  }

  /* ── Categories ── */
  const CATEGORIES = {
    expense: [
      { id: 'food',          name: 'Food',        icon: '🍔', color: '#f97316' },
      { id: 'shopping',      name: 'Shopping',    icon: '🛍️', color: '#ec4899' },
      { id: 'transport',     name: 'Transport',   icon: '🚗', color: '#3b82f6' },
      { id: 'bills',         name: 'Bills',       icon: '💡', color: '#eab308' },
      { id: 'health',        name: 'Health',      icon: '🏥', color: '#22c55e' },
      { id: 'entertainment', name: 'Fun',         icon: '🎮', color: '#a855f7' },
      { id: 'travel',        name: 'Travel',      icon: '✈️', color: '#06b6d4' },
      { id: 'housing',       name: 'Housing',     icon: '🏠', color: '#8b5cf6' },
      { id: 'personal',      name: 'Personal',    icon: '💊', color: '#f43f5e' },
      { id: 'education',     name: 'Education',   icon: '📚', color: '#0ea5e9' },
      { id: 'gifts',         name: 'Gifts',       icon: '🎁', color: '#d97706' },
      { id: 'other-exp',     name: 'Other',       icon: '📦', color: '#6b7280' },
    ],
    income: [
      { id: 'salary',    name: 'Salary',     icon: '💼', color: '#22c55e' },
      { id: 'freelance', name: 'Freelance',  icon: '💻', color: '#3b82f6' },
      { id: 'invest',    name: 'Investment', icon: '📈', color: '#8b5cf6' },
      { id: 'gift-in',   name: 'Gift',       icon: '🎁', color: '#f59e0b' },
      { id: 'other-inc', name: 'Other',      icon: '💰', color: '#6b7280' },
    ]
  };

  const WALLET_ICONS    = { bank:'🏦', cash:'💵', credit:'💳', savings:'🐖', investment:'📈', other:'📦' };
  const WALLET_COLORS   = ['#8b5cf6','#3b82f6','#22c55e','#f59e0b','#ef4444','#ec4899','#14b8a6','#f97316'];
  const CURRENCY_SYMBOL = { INR:'₹', AED:'AED ', USD:'$' };

  const ICON_OPTIONS = [
    // People & Family
    '👨','👩','🧒','👦','👧','👶','🧑','👴','👵','👨‍👩‍👧','👨‍👩‍👦','👪','🤱','🧒‍♂️','🧒‍♀️',
    // Food & Drink
    '🍔','🍕','🌮','🍜','🍣','🥗','☕','🍺','🍷','🧃','🍩','🎂','🥘','🍱',
    // Shopping & Style
    '🛍️','👗','👟','👜','🛒','💄','🧴','🎀','👒','🧢','👞','💍',
    // Transport
    '🚗','🚌','✈️','🚂','🚕','🛵','🚲','⛽','🚢','🏍️','🚁','🛺',
    // Home & Bills
    '💡','📱','🌐','💧','🔌','🏠','🛋️','🔑','🧹','📺','🪣','🧺',
    // Health & Wellness
    '💊','🏥','🧬','🏋️','🧘','🩺','🌡️','🦷','🧴','🩹',
    // Entertainment & Fun
    '🎮','🎬','🎵','🎭','🎯','📷','🎲','🎸','🎡','🎪',
    // Travel
    '🏖️','🏔️','🧳','🗺️','🏕️','⛺','🗼','🏛️',
    // Finance
    '💳','💰','📊','📈','🏦','💎','🪙','💵',
    // Personal & Education
    '💈','💅','👔','🪞','🎓','✂️','📚','✏️',
    // Nature & Misc
    '🐾','🌱','🎨','🪴','🌸','🐕','⚡','🎁','🌍','🍀','🌙','☀️','❄️','🔥',
  ];

  /* ── State ── */
  let _wallets = [], _transactions = [];
  let _viewYear = new Date().getFullYear(), _viewMonth = new Date().getMonth();
  let _txnType = 'expense', _selectedCat = null, _selectedColor = WALLET_COLORS[0];
  let _customCategories = [];
  let _selectedCatIcon  = ICON_OPTIONS[0];
  let _selectedCatColor = WALLET_COLORS[0];
  let _catFormType      = 'expense';
  let _activeWalletId   = null;
  let _fxRates          = {}; // e.g. { AED: 22.5, USD: 84.2 } — rate to INR

  /* ── Utilities ── */
  function getCategory(id) {
    if (id === '__transfer__') return { id, name: 'Transfer', icon: '⇄', color: '#22c55e' };
    return [...CATEGORIES.expense, ...CATEGORIES.income, ..._customCategories].find(c => c.id === id) || { id, name: 'Category', icon: '📦', color: '#6b7280' };
  }
  function getWallet(id) { return _wallets.find(w => w.id === id); }
  function sym(currency) { return CURRENCY_SYMBOL[currency] || currency + ' '; }
  function fmt(amount, currency) { return sym(currency || 'INR') + Math.abs(amount).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmtShort(amount, currency) { return sym(currency || 'INR') + Math.abs(amount).toLocaleString('en-IN', { maximumFractionDigits: 0 }); }
  function fmtBalance(amount, currency) { return (amount < 0 ? '-' : '') + sym(currency || 'INR') + Math.abs(amount).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function balColor(amount, walletColor) { return amount < 0 ? 'var(--red)' : walletColor; }
  function fmtDate(iso) { return new Date(iso + 'T00:00:00').toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }); }
  function fmtMonthYear(y, m) { return new Date(y, m, 1).toLocaleDateString('en-IN', { month: 'long', year: 'numeric' }); }
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function getWalletBalance(w) {
    const t = _transactions.filter(t => t.walletId === w.id);
    return (w.initialBalance || 0) + t.filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0) - t.filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0);
  }
  function getMonthTxns(y, m) {
    return _transactions.filter(t => { const d = new Date(t.date + 'T00:00:00'); return d.getFullYear() === y && d.getMonth() === m; });
  }

  /* ── FX rates (non-INR → INR) ── */
  async function fetchFxRates() {
    const foreign = [...new Set(_wallets.map(w => w.currency).filter(c => c && c !== 'INR'))];
    if (!foreign.length) return;
    try {
      // open.er-api.com supports AED/USD and needs no API key
      const res  = await fetch('https://open.er-api.com/v6/latest/INR');
      const data = await res.json();
      // rates are INR→X; invert each to get X→INR
      (foreign).forEach(cur => {
        const rate = (data.rates || {})[cur];
        if (rate) _fxRates[cur] = 1 / rate;
      });
    } catch (e) { console.warn('FX fetch failed', e); }
  }
  function toINR(amount, currency) {
    if (!currency || currency === 'INR') return amount;
    const rate = _fxRates[currency];
    return rate ? amount * rate : null; // null = rate not available yet
  }
  function fmtINR(amount) {
    return '₹' + Math.abs(amount).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  /* ── Month nav ── */
  function shiftMonth(delta) {
    _viewMonth += delta;
    if (_viewMonth > 11) { _viewMonth = 0; _viewYear++; }
    if (_viewMonth < 0)  { _viewMonth = 11; _viewYear--; }
    renderAll();
  }

  /* ── Tab switching ── */
  function switchTab(name, btn, skipHash) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (btn) btn.classList.add('active');
    else {
      const idx = { overview: 0, wallets: 1, transactions: 2, more: 3 };
      const btns = document.querySelectorAll('.tab-btn');
      if (btns[idx[name]]) btns[idx[name]].classList.add('active');
    }
    if (name === 'overview') renderOverview();
    if (!skipHash) location.hash = name;
  }

  /* ── Restore view from URL hash on load/refresh ── */
  function initFromHash() {
    const hash = location.hash.replace('#', '');
    if (!hash) return;
    if (hash.startsWith('wallet-')) {
      const id = parseInt(hash.replace('wallet-', ''));
      if (getWallet(id)) {
        switchTab('wallets', null, true);
        openWalletPanel(id, true);
      }
    } else if (hash.startsWith('more-')) {
      switchTab('more', null, true);
      const section = hash.replace('more-', '');
      openMorePanel(section, true);
    } else if (['overview','wallets','transactions','more'].includes(hash)) {
      switchTab(hash, null, true);
    }
  }


  /* ── API ── */
  async function fetchData() {
    const res = await fetch(API_BASE + '/api/funds', { headers: authHeaders() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to load');
    _wallets      = data.wallets      || [];
    _transactions = data.transactions || [];
    const serverCats = data.categories || [];
    const localCats  = JSON.parse(localStorage.getItem('funds_custom_cats') || '[]');
    const serverIds  = new Set(serverCats.map(c => c.id));
    _customCategories = [...serverCats, ...localCats.filter(c => !serverIds.has(c.id))];
  }
  async function apiAddCategory(cat) {
    const res = await fetch(API_BASE + '/api/funds/categories', { method: 'POST', headers: authHeaders(), body: JSON.stringify(cat) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    return data.category;
  }
  async function apiDeleteCategory(id) {
    const res = await fetch(API_BASE + '/api/funds/categories/' + encodeURIComponent(id), { method: 'DELETE', headers: authHeaders() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
  }
  async function apiAddWallet(w) {
    const res = await fetch(API_BASE + '/api/funds/wallets', { method: 'POST', headers: authHeaders(), body: JSON.stringify(w) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    return data.wallet;
  }
  async function apiDeleteWallet(id) {
    const res = await fetch(API_BASE + '/api/funds/wallets/' + id, { method: 'DELETE', headers: authHeaders() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
  }
  async function apiAddTxn(t) {
    const res = await fetch(API_BASE + '/api/funds/transactions', { method: 'POST', headers: authHeaders(), body: JSON.stringify(t) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    return data.transaction;
  }
  async function apiUpdateTxn(id, updates) {
    const res = await fetch(API_BASE + '/api/funds/transactions/' + id, { method: 'PATCH', headers: authHeaders(), body: JSON.stringify(updates) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
  }
  async function apiDeleteTxn(id) {
    const res = await fetch(API_BASE + '/api/funds/transactions/' + id, { method: 'DELETE', headers: authHeaders() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
  }

  /* ── Shared transaction list renderer ── */
  function renderTxnList(txns) {
    if (!txns.length) return '<div class="empty-state"><div class="icon">💸</div>No transactions found.<br>Tap + to add one.</div>';
    const grouped = {};
    txns.forEach(t => { (grouped[t.date] = grouped[t.date] || []).push(t); });
    const dates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));
    let html = '';
    dates.forEach(date => {
      html += `<div class="txn-group"><div class="txn-date-label">${fmtDate(date)}</div>`;
      grouped[date].forEach(t => {
        const cat    = getCategory(t.categoryId);
        const wallet = getWallet(t.walletId);
        const sign   = t.type === 'income' ? '+' : '-';
        html += `<div class="txn-row" onclick="openTxnDetail(${t.id})">
          <div class="txn-cat-icon" style="background:${cat.color}22">${cat.icon}</div>
          <div class="txn-info">
            <div class="txn-title">${escapeHtml(t.note || cat.name)}</div>
            <div class="txn-sub">${escapeHtml(cat.name)}${wallet ? ' · ' + escapeHtml(wallet.name) : ''}</div>
          </div>
          <span class="txn-amount ${t.type}">${sign}${fmt(t.amount, wallet?.currency)}</span>
          <span class="txn-chevron">&#8250;</span>
        </div>`;
      });
      html += '</div>';
    });
    return html;
  }

  /* ── Render wallet list ── */
  function renderWalletList() {
    const el = document.getElementById('walletList');
    if (!_wallets.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">🏦</div>No wallets yet.<br>Go to More → Wallets to add one.</div>';
      return;
    }
    el.innerHTML = '<div class="wallet-list">' + _wallets.map(w => {
      const bal      = getWalletBalance(w);
      const isForex  = w.currency && w.currency !== 'INR';
      const inrAmt   = isForex ? toINR(bal, w.currency) : null;
      const balLine  = isForex && inrAmt !== null
        ? `<div class="wallet-list-balance" style="color:${balColor(bal, w.color)};display:flex;align-items:baseline;gap:8px">
             <span>${(bal < 0 ? '-' : '') + fmtINR(inrAmt)}</span>
             <span style="font-size:0.72rem;color:var(--muted);font-variant-numeric:tabular-nums">${fmtBalance(bal, w.currency)}</span>
           </div>`
        : `<div class="wallet-list-balance" style="color:${balColor(bal, w.color)}">${fmtBalance(bal, w.currency)}</div>`;
      return `<div class="wallet-list-item" onclick="openWalletPanel(${w.id})">
        <div class="wallet-list-icon" style="background:${w.color}22">${WALLET_ICONS[w.type] || '📦'}</div>
        <div class="wallet-list-info">
          <div class="wallet-list-name">${escapeHtml(w.name)}</div>
          ${balLine}
        </div>
        <span style="color:rgba(0,0,0,0.2);font-size:0.9rem">&#8250;</span>
      </div>`;
    }).join('') + '</div>';
  }

  /* ── Color picker ── */
  function initColorPicker() {
    const el = document.getElementById('colorPicker');
    if (!el) return;
    el.innerHTML = WALLET_COLORS.map(c =>
      `<div class="color-swatch ${c === _selectedColor ? 'selected' : ''}" style="background:${c}" onclick="selectColor('${c}')"></div>`
    ).join('');
  }
  function selectColor(color) { _selectedColor = color; initColorPicker(); }

  /* ── Add wallet (called from More > Wallets panel) ── */
  async function addWallet() {
    const name = document.getElementById('wName').value.trim();
    if (!name) { alert('Please enter a wallet name.'); return; }
    const btn = document.getElementById('addWalletBtn');
    btn.disabled = true; btn.textContent = 'Adding…';
    try {
      await apiAddWallet({ name, type: document.getElementById('wType').value, currency: document.getElementById('wCurrency').value, color: _selectedColor, initialBalance: parseFloat(document.getElementById('wBalance').value) || 0 });
      await fetchData();
      document.getElementById('wName').value = '';
      document.getElementById('wBalance').value = '';
      _selectedColor = WALLET_COLORS[0];
      initColorPicker();
      renderMoreWalletList();
      renderWalletList();
      renderMoreMenu();
    } catch (err) { alert('Error: ' + err.message); }
    finally { btn.disabled = false; btn.textContent = '+ Add Wallet'; }
  }

  /* ── Delete wallet from More panel ── */
  async function deleteWalletFromMore(id) {
    const w = getWallet(id);
    if (!confirm(`Delete "${w?.name}"? All transactions in this wallet will also be removed.`)) return;
    try { await apiDeleteWallet(id); await fetchData(); renderMoreWalletList(); renderWalletList(); renderMoreMenu(); }
    catch (err) { alert('Error: ' + err.message); }
  }

  /* ── Transaction modal ── */
  function openTxnModal(preSelectedWalletId) {
    if (!_wallets.length) { alert('Please add a wallet first.'); return; }
    document.getElementById('txnAmount').value = '';
    document.getElementById('txnNote').value   = '';
    document.getElementById('txnDate').value   = new Date().toISOString().slice(0, 10);
    _selectedCat = null; _txnType = 'expense';
    const walletOptions = _wallets.map(w =>
      `<option value="${w.id}" ${w.id === preSelectedWalletId ? 'selected' : ''}>${WALLET_ICONS[w.type] || '📦'} ${escapeHtml(w.name)} (${w.currency})</option>`
    ).join('');
    document.getElementById('txnWallet').innerHTML   = walletOptions;
    document.getElementById('transferFrom').innerHTML = walletOptions;
    document.getElementById('transferTo').innerHTML   = walletOptions;
    if (_wallets.length > 1) document.getElementById('transferTo').selectedIndex = 1;
    // Reset to expense view
    document.getElementById('catGridField').style.display   = '';
    document.getElementById('txnWalletField').style.display = '';
    document.getElementById('transferWallets').classList.remove('visible');
    document.getElementById('saveTxnBtn').textContent = 'Save Transaction';
    document.getElementById('modal-title-text').textContent = 'Add Transaction';
    updateTxnTypeUI(); renderCatGrid();
    updateModalCurrencySymbol();
    document.getElementById('txnModal').classList.add('open');
  }
  function openTxnModalFromPanel() { openTxnModal(_activeWalletId); }
  function closeTxnModal() { document.getElementById('txnModal').classList.remove('open'); }
  function handleModalBackdropClick(e) { if (e.target === e.currentTarget) closeTxnModal(); }

  function setTxnType(type) {
    _txnType = type; _selectedCat = null;
    updateTxnTypeUI(); renderCatGrid();
    const isTransfer = type === 'transfer';
    document.getElementById('catGridField').style.display    = isTransfer ? 'none' : '';
    document.getElementById('txnWalletField').style.display  = isTransfer ? 'none' : '';
    document.getElementById('transferWallets').classList.toggle('visible', isTransfer);
    document.getElementById('saveTxnBtn').textContent = isTransfer ? 'Save Transfer' : 'Save Transaction';
    document.getElementById('modal-title-text').textContent  = isTransfer ? 'Add Transfer' : 'Add Transaction';
  }
  function updateTxnTypeUI() {
    document.getElementById('btnExpense').className  = 'type-toggle-btn' + (_txnType === 'expense'  ? ' active-expense'  : '');
    document.getElementById('btnIncome').className   = 'type-toggle-btn' + (_txnType === 'income'   ? ' active-income'   : '');
    document.getElementById('btnTransfer').className = 'type-toggle-btn' + (_txnType === 'transfer' ? ' active-transfer' : '');
  }
  function renderCatGrid() {
    const typedCustom = _customCategories.filter(c => c.type === _txnType);
    const cats = typedCustom.length ? typedCustom : [];
    const el = document.getElementById('catGrid');
    if (!cats.length) {
      el.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:16px 8px;color:var(--muted);font-size:0.8rem;line-height:1.5">
        No ${_txnType} categories yet.<br>Go to the <strong style="color:var(--accent)">Categories</strong> tab to add some.
      </div>`;
      return;
    }
    el.innerHTML = cats.map(c =>
      `<button class="cat-pick ${_selectedCat === c.id ? 'selected' : ''}" onclick="selectCat('${escapeHtml(c.id)}')">
        <span class="cat-pick-icon">${c.icon}</span>
        <span class="cat-pick-name">${escapeHtml(c.name)}</span>
      </button>`
    ).join('');
  }
  function selectCat(id) { _selectedCat = id; renderCatGrid(); }
  function updateModalCurrencySymbol() {
    const srcId = _txnType === 'transfer'
      ? parseInt(document.getElementById('transferFrom').value)
      : parseInt(document.getElementById('txnWallet').value);
    const w = getWallet(srcId);
    document.getElementById('modalCurrencySymbol').textContent = sym(w?.currency || 'INR');
  }

  /* ── Save transaction ── */
  async function saveTxn() {
    const amount = parseFloat(document.getElementById('txnAmount').value);
    const date   = document.getElementById('txnDate').value;
    const note   = document.getElementById('txnNote').value.trim();
    if (!amount || amount <= 0) { alert('Please enter a valid amount.'); return; }
    if (!date) { alert('Please select a date.'); return; }
    const btn = document.getElementById('saveTxnBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      if (_txnType === 'transfer') {
        const fromId = parseInt(document.getElementById('transferFrom').value);
        const toId   = parseInt(document.getElementById('transferTo').value);
        if (fromId === toId) { alert('From and To wallets must be different.'); btn.disabled = false; btn.textContent = 'Save Transfer'; return; }
        const toW   = getWallet(toId);
        const fromW = getWallet(fromId);
        await apiAddTxn({ date, amount, type: 'expense', categoryId: '__transfer__', walletId: fromId, note: note || 'Transfer to ' + (toW?.name || '') });
        await apiAddTxn({ date, amount, type: 'income',  categoryId: '__transfer__', walletId: toId,   note: note || 'Transfer from ' + (fromW?.name || '') });
      } else {
        const walletId = parseInt(document.getElementById('txnWallet').value);
        if (!_selectedCat) { alert('Please select a category.'); btn.disabled = false; btn.textContent = 'Save Transaction'; return; }
        await apiAddTxn({ date, amount, type: _txnType, categoryId: _selectedCat, walletId, note });
      }
      await fetchData(); closeTxnModal();
      if (_activeWalletId) renderWalletPanel(); else renderAll();
    } catch (err) { alert('Error: ' + err.message); }
    finally { btn.disabled = false; btn.textContent = _txnType === 'transfer' ? 'Save Transfer' : 'Save Transaction'; }
  }

      <div class="type-toggle" style="margin-bottom:14px">
        <button class="type-toggle-btn ${_editTxnType==='expense'?'active-expense':''}" id="editBtnExpense" onclick="setEditTxnType('expense')">&#8595; Expense</button>
        <button class="type-toggle-btn ${_editTxnType==='income'?'active-income':''}"  id="editBtnIncome"  onclick="setEditTxnType('income')">&#8593; Income</button>

    _editTxnType = type;
    _editCat = null;
    document.getElementById('editBtnExpense').className = 'type-toggle-btn' + (type==='expense' ? ' active-expense' : '');

  function renderEditCatGrid() {
    const el = document.getElementById('editCatGrid');
    if (!el) return;
    const list = _customCategories.filter(c => c.type === _editTxnType);
    el.innerHTML = list.map(c =>
      `<option value="${c.id}" ${c.id === _editCat ? 'selected' : ''}>${c.icon} ${escapeHtml(c.name)}</option>`

  function selectEditCat(id) { _editCat = id; }

  function updateEditCurrencySymbol() {
    const w = getWallet(parseInt(document.getElementById('editTxnWallet').value));
    const el = document.getElementById('editCurrencySymbol');
    if (el) el.textContent = sym(w?.currency || 'INR');
  }

  async function saveTxnEdit() {
    const amount     = parseFloat(document.getElementById('editTxnAmount').value);
    const walletId   = parseInt(document.getElementById('editTxnWallet').value);
    const date       = document.getElementById('editTxnDate').value;
    const note       = document.getElementById('editTxnNote').value.trim();
    const categoryId = document.getElementById('editCatGrid').value;
    if (!amount || amount <= 0) { alert('Enter a valid amount.'); return; }
    if (!categoryId) { alert('Please select a category.'); return; }
    if (!date) { alert('Please select a date.'); return; }
    const btn = document.getElementById('saveEditTxnBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      await apiUpdateTxn(_editingTxnId, { date, amount, type: _editTxnType, categoryId, walletId, note });
      await fetchData(); closeTxnDetail();
      if (_activeWalletId) renderWalletPanel(); else renderAll();
    } catch (err) {
      alert('Error: ' + err.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Save Changes';
    }

  function closeTxnDetail() { document.getElementById('txnDetailModal').classList.remove('open'); }

  async function deleteTxnFromDetail(id) {
    if (!confirm('Delete this transaction?')) return;
    try {
      await apiDeleteTxn(id); await fetchData(); closeTxnDetail();
      if (_activeWalletId) renderWalletPanel(); else renderAll();
    } catch (err) { alert('Error: ' + err.message); }

  /* ── Wallet panel ── */
  function openWalletPanel(id, skipHash) {
    _activeWalletId = id;
    renderWalletPanel();
    document.getElementById('walletPanel').style.display = 'block';
    document.body.style.overflow = 'hidden';
    if (!skipHash) location.hash = 'wallet-' + id;
  }
  function closeWalletPanel() {
    document.getElementById('walletPanel').style.display = 'none';
    document.body.style.overflow = '';
    _activeWalletId = null;
    location.hash = 'wallets';
  }
  function toggleWalletPanelMenu(e) {
    e.stopPropagation();
    const menu = document.getElementById('walletPanelMenu');
    menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
  }
  function closeWalletPanelMenu() {
    const m = document.getElementById('walletPanelMenu');
    if (m) m.style.display = 'none';
  }
  function renderWalletPanel() {
    const w = getWallet(_activeWalletId);
    if (!w) return;
    const bal        = getWalletBalance(w);
    const walletTxns = _transactions.filter(t => t.walletId === w.id);
    const monthTxns  = getMonthTxns(_viewYear, _viewMonth).filter(t => t.walletId === w.id);
    const income     = monthTxns.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expense    = monthTxns.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const cashFlow   = income - expense;
    document.getElementById('walletPanelName').textContent = w.name;

    // Summary cards
    document.getElementById('walletPanelSummary').innerHTML = `
      <div style="display:flex;align-items:stretch;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:4px;overflow:hidden">
        <div style="flex:1;padding:16px;text-align:center;border-right:1px solid var(--border)">
          ${(()=>{
            const isForex = w.currency && w.currency !== 'INR';
            const inrAmt  = isForex ? toINR(bal, w.currency) : null;
            if (isForex && inrAmt !== null) {
              return `<div style="display:flex;align-items:baseline;justify-content:center;gap:8px;flex-wrap:wrap">
                        <span style="font-size:1.45rem;font-weight:800;color:${balColor(bal,w.color)};font-variant-numeric:tabular-nums;letter-spacing:-0.02em">${(bal<0?'-':'') + fmtINR(inrAmt)}</span>
                        <span style="font-size:0.82rem;color:var(--muted);font-variant-numeric:tabular-nums">${fmtBalance(bal,w.currency)}</span>
                      </div>`;
            }
            return `<div style="font-size:1.45rem;font-weight:800;color:${balColor(bal,w.color)};font-variant-numeric:tabular-nums;letter-spacing:-0.02em">${fmtBalance(bal,w.currency)}</div>`;
          })()}
          <div style="font-size:0.68rem;color:var(--muted);margin-top:4px">Wallet Balance</div>
        </div>
        <div style="flex:1;padding:16px;text-align:center">
          <div style="font-size:1.45rem;font-weight:800;color:${cashFlow<0?'var(--red)':'var(--green)'};font-variant-numeric:tabular-nums;letter-spacing:-0.02em">${cashFlow<0?'-':'+'}${sym(w.currency)}${Math.abs(cashFlow).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:0})}</div>
          <div style="font-size:0.68rem;color:var(--muted);margin-top:4px">Monthly Cash Flow</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:center;gap:16px;padding:10px 0 6px">
        <button onclick="shiftMonth(-1);renderWalletPanel()" style="background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:4px 10px;border-radius:6px;line-height:1">&#8249;</button>
        <span style="font-size:0.88rem;font-weight:600;min-width:130px;text-align:center">${fmtMonthYear(_viewYear,_viewMonth)}</span>
        <button onclick="shiftMonth(1);renderWalletPanel()" style="background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:4px 10px;border-radius:6px;line-height:1">&#8250;</button>
      </div>`;

    // Transactions for selected month only
    const sorted = monthTxns.slice().sort((a,b) => b.date.localeCompare(a.date));
    document.getElementById('walletPanelTxns').innerHTML =
      sorted.length ? renderWalletTxnList(sorted, w) : '<div class="empty-state"><div class="icon">💸</div>No transactions this month.<br>Tap + to add one.</div>';
  }

  function renderWalletTxnList(txns, w) {
    const grouped = {};
    txns.forEach(t => { (grouped[t.date] = grouped[t.date] || []).push(t); });
    const dates = Object.keys(grouped).sort((a,b) => b.localeCompare(a));
    let html = '';
    dates.forEach(date => {
      const dayTotal = grouped[date].reduce((s,t) => t.type==='expense' ? s-t.amount : s+t.amount, 0);
      const dayColor = dayTotal < 0 ? 'var(--red)' : 'var(--green)';
      html += `<div class="txn-group">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 2px 6px">
          <span class="txn-date-label" style="padding:0">${fmtDate(date)}</span>
          <span style="font-size:0.75rem;font-weight:700;color:${dayColor};font-variant-numeric:tabular-nums">${dayTotal<0?'-':'+'}${sym(w.currency)}${Math.abs(dayTotal).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:0})}</span>
        </div>`;
      grouped[date].forEach(t => {
        const cat  = getCategory(t.categoryId);
        const sign = t.type === 'income' ? '+' : '-';
        html += `<div class="txn-row" onclick="openTxnDetail(${t.id})">
          <div class="txn-cat-icon" style="background:${cat.color};border-radius:50%;width:38px;height:38px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem">${cat.icon}</div>
          <div class="txn-info">
            <div class="txn-title">${escapeHtml(t.note || cat.name)}</div>
            <div class="txn-sub">${escapeHtml(w.name)}${t.note ? ' · ' + escapeHtml(cat.name) : ''}</div>
          </div>
          <span class="txn-amount ${t.type}">${sign}${fmt(t.amount,w.currency)}</span>
          <span class="txn-chevron">&#8250;</span>
        </div>`;
      });
      html += '</div>';
    });
    return html;
  }
  async function deleteActiveWallet() {
    closeWalletPanelMenu();
    const w = getWallet(_activeWalletId);
    if (!confirm(`Delete "${w?.name}"? All transactions in this wallet will also be removed.`)) return;
    try { await apiDeleteWallet(_activeWalletId); await fetchData(); closeWalletPanel(); renderWalletList(); renderMoreMenu(); }
    catch (err) { alert('Error: ' + err.message); }
  }

  async function saveWallet() {
    const name         = document.getElementById('weditName').value.trim();
    const type         = document.getElementById('weditType').value;
    const initialBalance = parseFloat(document.getElementById('weditBalance').value) || 0;
    if (!name) { alert('Please enter a wallet name.'); return; }

  function ovShiftMonth(delta) {
    const period = document.getElementById('ovPeriodFilter')?.value || 'month';
    if (period === 'year') {
      _ovYear += delta;
    } else {
      _ovMonth += delta;

  function renderOverview() {
    // Populate wallet filter

    if (wSel) {

    if (period === 'all') {
      if (navEl) navEl.style.display = 'none';

      if (lblEl) {
        lblEl.textContent = period === 'year'
          ? String(_ovYear)
          : new Date(_ovYear, _ovMonth, 1).toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });
      }
    }

    // Filter transactions
    let txns = _transactions;
    if (selWallet !== 'all') txns = txns.filter(t => t.walletId === parseInt(selWallet));
    if (period === 'month') {
      txns = txns.filter(t => { const d = new Date(t.date + 'T00:00:00'); return d.getFullYear() === _ovYear && d.getMonth() === _ovMonth; });
    } else if (period === 'year') {
      txns = txns.filter(t => new Date(t.date + 'T00:00:00').getFullYear() === _ovYear);
    }

    const totalExp = txns.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const totalInc = txns.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);

          <div style="font-size:1.1rem;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums">+${fmtINR(totalInc)}</div>
          <div style="font-size:0.7rem;color:var(--muted);margin-top:3px">Income</div>
        </div>
      </div>`;

    // Store filtered txns for chart
    window._ovTxns = txns;
    renderOverviewChart();
  }

  function renderOverviewChart() {
    const txns   = window._ovTxns || [];
    const typed  = txns.filter(t => t.type === _ovType && t.categoryId !== '__transfer__');
    const total  = typed.reduce((s, t) => s + t.amount, 0);

    // Group by category
    const groups = {};
    typed.forEach(t => {
      if (!groups[t.categoryId]) groups[t.categoryId] = { amount: 0, count: 0 };
      groups[t.categoryId].amount += t.amount;
      groups[t.categoryId].count  += 1;
    });

    const sorted = Object.entries(groups)
      .map(([id, g]) => ({ cat: getCategory(id), amount: g.amount, count: g.count }))
      .sort((a, b) => b.amount - a.amount);

    const chartEl = document.getElementById('ovChart');
    const listEl  = document.getElementById('ovCatList');

    if (!sorted.length) {
      if (chartEl) chartEl.innerHTML = `<div style="text-align:center;padding:32px 0;color:var(--muted);font-size:0.88rem">No ${_ovType} transactions</div>`;
      if (listEl)  listEl.innerHTML  = '';
      return;
    }

    // Build SVG donut
    const size   = 220;
    const cx     = size / 2, cy = size / 2;
    const R      = 88, r = 52; // outer and inner radius
    let angle    = -Math.PI / 2; // start from top
    let slices   = '';
    let labels   = '';

    sorted.forEach((item, i) => {
      const pct    = item.amount / total;
      const sweep  = pct * 2 * Math.PI;
      const midA   = angle + sweep / 2;
      const x1     = cx + R * Math.cos(angle),         y1 = cy + R * Math.sin(angle);
      const x2     = cx + R * Math.cos(angle + sweep), y2 = cy + R * Math.sin(angle + sweep);
      const xi1    = cx + r * Math.cos(angle),         yi1 = cy + r * Math.sin(angle);
      const xi2    = cx + r * Math.cos(angle + sweep), yi2 = cy + r * Math.sin(angle + sweep);
      const large  = sweep > Math.PI ? 1 : 0;
      const color  = item.cat.color;

      slices += `<path d="M${xi1},${yi1} L${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} L${xi2},${yi2} A${r},${r} 0 ${large},0 ${xi1},${yi1} Z"
        fill="${color}" stroke="#fff" stroke-width="2" />`;

      // Percentage label — only if segment is big enough
      if (pct >= 0.04) {
        const lR  = R + 14;
        const lx  = cx + lR * Math.cos(midA);
        const ly  = cy + lR * Math.sin(midA);
        labels += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle"
          font-size="9" font-weight="700" fill="${color}" font-family="-apple-system,sans-serif">${Math.round(pct * 100)}%</text>`;
      }

      // Icon on slice — only for larger segments
      if (pct >= 0.08) {
        const iR  = (R + r) / 2;
        const ix  = cx + iR * Math.cos(midA);
        const iy  = cy + iR * Math.sin(midA);
        labels += `<text x="${ix}" y="${iy}" text-anchor="middle" dominant-baseline="middle" font-size="14">${item.cat.icon}</text>`;
      }

      angle += sweep;
    });

    if (chartEl) chartEl.innerHTML = `
      <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
        ${slices}${labels}
        <circle cx="${cx}" cy="${cy}" r="${r - 2}" fill="var(--bg)" />
      </svg>`;

    // Category list
    if (listEl) listEl.innerHTML = `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px">
        ${sorted.map((item, i) => {
          const pct = ((item.amount / total) * 100).toFixed(1);
          return `<div style="display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:${i < sorted.length-1 ? '1px solid var(--border)' : 'none'}">
            <div style="width:40px;height:40px;border-radius:12px;background:${item.cat.color}22;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0">${item.cat.icon}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:0.88rem;font-weight:600">${escapeHtml(item.cat.name)}</div>
              <div style="font-size:0.72rem;color:var(--muted);margin-top:2px">${item.count} transaction${item.count !== 1 ? 's' : ''}</div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-size:0.9rem;font-weight:700;color:${_ovType === 'expense' ? 'var(--red)' : 'var(--green)'};font-variant-numeric:tabular-nums">${_ovType === 'expense' ? '-' : '+'}${fmtINR(item.amount)}</div>
              <div style="font-size:0.7rem;color:var(--muted);margin-top:1px">${pct}%</div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
  }

            <button onclick="event.stopPropagation();openWalletEditPanelFor(${w.id})" style="width:100%;padding:12px 16px;background:none;border:none;color:var(--text);font-size:0.88rem;cursor:pointer;text-align:left;font-family:inherit;display:flex;align-items:center;gap:8px">&#9998; Edit</button>
            <div style="height:1px;background:var(--border);margin:0 12px"></div>
            <button onclick="event.stopPropagation();deleteWalletFromMore(${w.id})" style="width:100%;padding:12px 16px;background:none;border:none;color:var(--red);font-size:0.88rem;cursor:pointer;text-align:left;font-family:inherit;display:flex;align-items:center;gap:8px">&#128465; Delete</button>
          </div>
        </div>
      </div>`;
    }).join('') + '</div>';
  }

  function toggleMoreWalletMenu(e, id) {
    e.stopPropagation();
    document.querySelectorAll('[id^="moreWalletMenu-"]').forEach(m => {
      if (m.id !== 'moreWalletMenu-' + id) m.style.display = 'none';
    });
    const menu = document.getElementById('moreWalletMenu-' + id);
    if (!menu) return;
    if (menu.style.display === 'block') { menu.style.display = 'none'; return; }
    // Use fixed positioning so the menu is never clipped by a scrollable parent
    const btnRect    = e.currentTarget.getBoundingClientRect();
    const menuWidth  = 160;
    const menuHeight = 110;
    const spaceBelow = window.innerHeight - btnRect.bottom;
    menu.style.position = 'fixed';
    menu.style.right    = 'auto';
    menu.style.left     = Math.max(4, btnRect.right - menuWidth) + 'px';
    if (spaceBelow >= menuHeight) {
      menu.style.top    = (btnRect.bottom + 4) + 'px';
      menu.style.bottom = 'auto';
    } else {
      menu.style.bottom = (window.innerHeight - btnRect.top + 4) + 'px';
      menu.style.top    = 'auto';
    }
    menu.style.display = 'block';
  }

  function openWalletEditPanelFor(id) {
    document.querySelectorAll('[id^="moreWalletMenu-"]').forEach(m => m.style.display = 'none');
    _activeWalletId = id;
    renderWalletEditPanel();
    document.getElementById('walletEditPanel').style.display = 'block';
  }

  /* ── More > Categories panel ── */
  function openMoreCatsPanel() {
    _catListType = 'expense';
    document.getElementById('moreSubPanelContent').innerHTML = `
      <div class="cat-type-toggle">
        <button class="cat-type-btn active" id="catListBtnExpense" onclick="setCatListType('expense')">Expenses</button>
        <button class="cat-type-btn" id="catListBtnIncome" onclick="setCatListType('income')">Income</button>
      </div>
      <div id="customCatList"></div>
      <div class="add-wallet-card" style="margin-top:16px">
        <div class="add-wallet-title">Add Category</div>
        <div class="type-toggle" style="margin-bottom:14px;display:none">
          <button class="type-toggle-btn active-expense" id="catFormBtnExpense" onclick="setCatFormType('expense')">&#8595; Expense</button>
          <button class="type-toggle-btn" id="catFormBtnIncome" onclick="setCatFormType('income')">&#8593; Income</button>
        </div>
        <div class="field">
          <label>Category Name</label>
          <input type="text" id="catName" placeholder="e.g. Gym" maxlength="20" />
        </div>
        <div class="field">
          <label>Color</label>
          <div class="color-row" id="catColorPicker" ontouchstart="document.activeElement.blur()"></div>
        </div>
        <div class="field">
          <label>Icon</label>
          <div class="icon-grid" id="catIconPicker" ontouchstart="document.activeElement.blur()"></div>
        </div>
        <button class="btn-primary" id="addCatBtn" onclick="addCustomCat()">+ Add Category</button>
      </div>`;
    _selectedCatIcon  = ICON_OPTIONS[0];
    _selectedCatColor = WALLET_COLORS[0];
    _catFormType      = 'expense';
    initCatIconPicker();
    initCatColorPicker();
    renderCategoriesTab();
  }

  /* ── More > Labels panel ── */
  let _labels = JSON.parse(localStorage.getItem('funds_labels') || '[]');
  let _selectedLabelColor = WALLET_COLORS[0];
  function openMoreLabelsPanel() {
    document.getElementById('moreSubPanelContent').innerHTML = `
      <div id="labelList"></div>
      <div class="add-wallet-card" style="margin-top:4px">
        <div class="add-wallet-title">Add Label</div>
        <div class="field">
          <label>Label Name</label>
          <input type="text" id="labelName" placeholder="e.g. Work, Family" maxlength="20" />
        </div>
        <div class="field">
          <label>Color</label>
          <div class="color-row" id="labelColorPicker"></div>
        </div>
        <button class="btn-primary" id="addLabelBtn" onclick="addLabel()">+ Add Label</button>
      </div>`;
    _selectedLabelColor = WALLET_COLORS[0];
    initLabelColorPicker();
    renderLabelList();
  }
  function initLabelColorPicker() {
    const el = document.getElementById('labelColorPicker');
    if (!el) return;
    el.innerHTML = WALLET_COLORS.map(c =>
      `<div class="color-swatch ${c === _selectedLabelColor ? 'selected' : ''}" style="background:${c}" onclick="selectLabelColor('${c}')"></div>`
    ).join('');
  }
  function selectLabelColor(color) { _selectedLabelColor = color; initLabelColorPicker(); }
  function renderLabelList() {
    const el = document.getElementById('labelList');
    if (!el) return;
    if (!_labels.length) {
      el.innerHTML = '<div class="empty-state" style="margin-bottom:16px"><div class="icon">🔖</div>No labels yet.<br>Add one below.</div>';
      return;
    }
    el.innerHTML = '<div class="custom-cat-grid">' + _labels.map((lb, i) =>
      `<div class="custom-cat-item">
        <button class="custom-cat-del" onclick="deleteLabel(${i})" title="Delete">&#10005;</button>
        <div style="background:${lb.color}22;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem">🔖</div>
        <span class="ci-name">${escapeHtml(lb.name)}</span>
      </div>`
    ).join('') + '</div>';
  }
  function addLabel() {
    const name = document.getElementById('labelName').value.trim();
    if (!name) { alert('Please enter a label name.'); return; }
    _labels.push({ id: 'label-' + Date.now(), name, color: _selectedLabelColor });
    localStorage.setItem('funds_labels', JSON.stringify(_labels));
    document.getElementById('labelName').value = '';
    _selectedLabelColor = WALLET_COLORS[0];
    initLabelColorPicker();
    renderLabelList();
    renderMoreMenu();
  }
  function deleteLabel(i) {
    if (!confirm(`Delete label "${_labels[i]?.name}"?`)) return;
    _labels.splice(i, 1);
    localStorage.setItem('funds_labels', JSON.stringify(_labels));
    renderLabelList();
    renderMoreMenu();
  }

  /* ── Init ── */
  document.getElementById('monthLabel').textContent = fmtMonthYear(_viewYear, _viewMonth);
  renderMoreMenu();

  /* Close ⋮ menus when clicking outside */
  document.addEventListener('click', function(e) {
    if (!e.target.closest('[id^="moreWalletMenu-"]') && !e.target.closest('button[onclick*="toggleMoreWalletMenu"]')) {
      document.querySelectorAll('[id^="moreWalletMenu-"]').forEach(m => m.style.display = 'none');
    }
    if (!e.target.closest('#walletPanelMenuBtn') && !e.target.closest('#walletPanelMenu')) {
      closeWalletPanelMenu();
    }
    if (!e.target.closest('#catPanelMenuBtn') && !e.target.closest('#catPanelMenu')) {
      closeCatPanelMenu();
    }
  });

  fetchData().then(async () => {
    // One-time migration: push any localStorage categories to the server
    const localCats = JSON.parse(localStorage.getItem('funds_custom_cats') || '[]');
    if (localCats.length > 0) {
      for (const cat of localCats) {
        try { await apiAddCategory(cat); } catch (e) { /* skip duplicates/errors */ }
      }
      localStorage.removeItem('funds_custom_cats');
      await fetchData();
    }
    // Fetch live FX rates then re-render with INR conversions
    await fetchFxRates();
    renderAll();
    initFromHash();
  }).catch(err => {
    console.error('Failed to load:', err.message);
  });
</script>
<script src="session-guard.js"></script>
</body>
</html>
