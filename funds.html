<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Funds – Money Manager</title>
  <script>if (!localStorage.getItem('auth_session')) window.location.replace('login.html');</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:            #0f1117;
      --surface:       #1a1d27;
      --surface2:      #1f2330;
      --border:        rgba(255,255,255,0.08);
      --text:          #f0f0f0;
      --muted:         rgba(240,240,240,0.45);
      --accent:        #8b5cf6;
      --accent-bg:     rgba(139,92,246,0.10);
      --accent-border: rgba(139,92,246,0.25);
      --green:         #22c55e;
      --green-bg:      rgba(34,197,94,0.10);
      --red:           #ef4444;
      --red-bg:        rgba(239,68,68,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 44px 0 88px;
    }

    /* ── Back bar ── */
    .back-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(15,17,23,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 44px;
    }
    .back-link {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.82rem; color: var(--muted);
      text-decoration: none; transition: color 0.18s;
    }
    .back-link:hover { color: var(--accent); }
    .back-bar-title { font-size: 0.88rem; font-weight: 600; }

    /* ── Page wrap ── */
    .page-wrap { max-width: 480px; margin: 0 auto; padding: 0 16px; }

    /* ── Month nav ── */
    .month-nav {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; padding: 12px 0 4px;
    }
    .month-nav-btn {
      background: none; border: none; color: var(--muted);
      font-size: 1.2rem; cursor: pointer; padding: 4px 10px;
      border-radius: 6px; transition: color 0.15s, background 0.15s; line-height: 1;
    }
    .month-nav-btn:hover { color: var(--accent); background: var(--accent-bg); }
    .month-nav-label { font-size: 0.9rem; font-weight: 600; min-width: 130px; text-align: center; }

    /* ── Tab bar (bottom nav) ── */
    .tab-bar {
      position: fixed; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      z-index: 100; display: flex;
      background: rgba(15,17,23,0.96);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 6px 0 max(10px, env(safe-area-inset-bottom));
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      padding: 6px 4px;
      border: none; background: none;
      font-size: 0.62rem; font-weight: 600; letter-spacing: 0.01em;
      color: var(--muted); cursor: pointer;
      transition: color 0.15s; font-family: inherit; line-height: 1;
    }
    .tab-btn .tab-icon { font-size: 1.4rem; line-height: 1; }
    .tab-btn.active { color: var(--accent); }

    /* ── Section title ── */
    .section-title {
      font-size: 0.68rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 10px; padding-left: 2px;
    }

    /* ── Transactions ── */
    .txn-group { margin-bottom: 14px; }
    .txn-date-label { font-size: 0.67rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 0 4px 8px; }
    .txn-row {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 11px 13px;
      display: flex; align-items: center; gap: 11px;
      margin-bottom: 6px; transition: background 0.15s;
    }
    .txn-row:hover { background: var(--surface2); }
    .txn-cat-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
    .txn-info { flex: 1; min-width: 0; }
    .txn-title { font-size: 0.87rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .txn-sub   { font-size: 0.71rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .txn-amount { font-size: 0.92rem; font-weight: 700; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .txn-amount.income  { color: var(--green); }
    .txn-amount.expense { color: var(--red); }
    .txn-row { cursor: pointer; }
    .txn-chevron { font-size: 0.7rem; color: rgba(240,240,240,0.18); flex-shrink: 0; }

    /* ── Wallet list ── */
    .wallet-list-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 13px 15px;
      display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
    }
    .wallet-list-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
    .wallet-list-info { flex: 1; min-width: 0; }
    .wallet-list-name { font-size: 0.9rem; font-weight: 600; }
    .wallet-list-meta { font-size: 0.71rem; color: var(--muted); margin-top: 2px; }
    .wallet-list-balance { font-size: 0.98rem; font-weight: 700; font-variant-numeric: tabular-nums; text-align: right; }
    .wallet-list-item { cursor: pointer; }
    .wallet-chevron { font-size: 0.7rem; color: rgba(240,240,240,0.18); flex-shrink: 0; margin-left: 4px; }

    /* ── Detail sheet ── */
    .detail-icon-wrap { width: 64px; height: 64px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 12px; }
    .detail-amount { font-size: 2rem; font-weight: 800; font-variant-numeric: tabular-nums; text-align: center; margin-bottom: 4px; letter-spacing: -0.02em; }
    .detail-meta { font-size: 0.8rem; color: var(--muted); text-align: center; margin-bottom: 20px; }
    .detail-rows { background: rgba(255,255,255,0.03); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    .detail-row:last-child { border-bottom: none; }
    .detail-row-label { color: var(--muted); }
    .detail-row-value { font-weight: 500; text-align: right; }
    .btn-danger { width: 100%; padding: 12px; background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25); border-radius: 9px; color: var(--red); font-size: 0.92rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: background 0.15s; margin-top: 4px; }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .btn-cancel-link { width: 100%; margin-top: 8px; padding: 10px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.88rem; font-family: inherit; }

    /* ── Add wallet form ── */
    .add-wallet-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-top: 4px; }
    .add-wallet-title { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

    /* ── Form fields ── */
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
    .field input, .field select {
      width: 100%; padding: 10px 12px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text); font-size: 0.9rem;
      font-family: inherit; outline: none; transition: border-color 0.15s;
      appearance: none; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field input::placeholder { color: rgba(240,240,240,0.2); }
    .field select option { background: #1a1d27; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Color picker */
    .color-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-swatch { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.15s, border-color 0.15s; }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: #fff; transform: scale(1.1); }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%; padding: 12px; background: var(--accent); border: none;
      border-radius: 9px; color: #fff; font-size: 0.92rem; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: filter 0.15s, transform 0.1s; margin-top: 4px;
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 24px; right: 24px;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent); border: none; color: #fff;
      font-size: 1.7rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(139,92,246,0.45);
      z-index: 50; transition: transform 0.2s, box-shadow 0.2s; line-height: 1;
    }
    .fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(139,92,246,0.55); }

    /* ── Modal (bottom sheet) ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 200; display: none; align-items: flex-end; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal-sheet {
      background: var(--surface); border-radius: 20px 20px 0 0;
      width: 100%; max-width: 480px; padding: 16px 20px 32px;
      max-height: 92vh; overflow-y: auto;
      animation: slideUp 0.28s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 99px; margin: 0 auto 16px; }
    .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 16px; text-align: center; }

    /* Type toggle */
    .type-toggle { display: flex; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 4px; gap: 4px; margin-bottom: 14px; }
    .type-toggle-btn { flex: 1; padding: 10px; border: none; border-radius: 7px; font-size: 0.88rem; font-weight: 600; font-family: inherit; cursor: pointer; background: none; color: var(--muted); transition: all 0.15s; }
    .type-toggle-btn.active-income  { background: rgba(34,197,94,0.15);  color: var(--green); }
    .type-toggle-btn.active-expense { background: rgba(239,68,68,0.12);  color: var(--red); }

    /* Amount input */
    .amount-input-wrap {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 16px; margin-bottom: 14px; transition: border-color 0.15s;
    }
    .amount-input-wrap:focus-within { border-color: var(--accent); }
    .amount-currency { font-size: 1.4rem; font-weight: 700; color: var(--muted); flex-shrink: 0; }
    .amount-input { flex: 1; background: none; border: none; outline: none; font-size: 1.8rem; font-weight: 700; color: var(--text); font-family: inherit; font-variant-numeric: tabular-nums; min-width: 0; }
    .amount-input::placeholder { color: rgba(240,240,240,0.15); }

    /* Category grid */
    .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 14px; }
    .cat-pick { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 4px; border-radius: 10px; border: 1px solid transparent; cursor: pointer; transition: background 0.15s, border-color 0.15s; background: none; font-family: inherit; color: var(--text); }
    .cat-pick:hover { background: rgba(255,255,255,0.05); }
    .cat-pick.selected { background: var(--accent-bg); border-color: var(--accent-border); }
    .cat-pick-icon { font-size: 1.25rem; }
    .cat-pick-name { font-size: 0.6rem; color: var(--muted); text-align: center; line-height: 1.2; }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 36px 24px; color: var(--muted); font-size: 0.88rem; border: 1px dashed rgba(255,255,255,0.1); border-radius: 14px; }
    .empty-state .icon { font-size: 2rem; margin-bottom: 8px; }

    /* ── Tabs ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Icon picker ── */
    .icon-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; margin-top: 2px; max-height: 220px; overflow-y: auto; padding-right: 2px; }
    .icon-pick { display: flex; align-items: center; justify-content: center; height: 36px; border-radius: 8px; border: 1px solid transparent; background: rgba(255,255,255,0.04); cursor: pointer; font-size: 1.15rem; transition: background 0.12s, border-color 0.12s; }
    .icon-pick:hover { background: rgba(255,255,255,0.09); }
    .icon-pick.selected { background: var(--accent-bg); border-color: var(--accent-border); }

    /* ── Custom category list ── */
    .custom-cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
    .custom-cat-item { display: flex; flex-direction: column; align-items: center; gap: 5px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 8px; position: relative; }
    .custom-cat-item .ci-icon { font-size: 1.4rem; }
    .custom-cat-item .ci-name { font-size: 0.72rem; color: var(--muted); text-align: center; word-break: break-word; }
    .custom-cat-del { position: absolute; top: 5px; right: 5px; background: none; border: none; color: rgba(240,240,240,0.2); cursor: pointer; font-size: 0.65rem; padding: 2px; border-radius: 4px; transition: color 0.15s, background 0.15s; line-height: 1; }
    .custom-cat-del:hover { color: var(--red); background: var(--red-bg); }
    /* ── More menu items ── */
    .more-section-title {
      font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); padding: 16px 2px 8px; font-weight: 600;
    }
    .more-menu-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 8px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .more-menu-item:hover { background: var(--surface2); border-color: rgba(139,92,246,0.25); }
    .more-menu-icon {
      width: 42px; height: 42px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem; flex-shrink: 0;
    }
    .more-menu-info { flex: 1; min-width: 0; }
    .more-menu-name { font-size: 0.9rem; font-weight: 600; }
    .more-menu-meta { font-size: 0.71rem; color: var(--muted); margin-top: 2px; }
    .more-menu-chevron { font-size: 0.85rem; color: rgba(240,240,240,0.2); flex-shrink: 0; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .page-wrap { padding: 0 12px; }
    }
  </style>
</head>
<body>

<nav class="back-bar">
  <a href="dashboard.html" class="back-link">&#8592; Dashboard</a>
  <span class="back-bar-title">&#128176; Funds</span>
  <div style="width:80px"></div>
</nav>

<div class="page-wrap">

  <!-- Month navigation -->
  <div class="month-nav">
    <button class="month-nav-btn" onclick="shiftMonth(-1)">&#8249;</button>
    <span class="month-nav-label" id="monthLabel">—</span>
    <button class="month-nav-btn" onclick="shiftMonth(1)">&#8250;</button>
  </div>

  <!-- Overview tab -->
  <div id="tab-overview" class="tab-panel">
    <div class="empty-state" style="margin-top:40px">
      <div class="icon">🏠</div>
      Coming soon — overview &amp; analytics
    </div>
  </div>

  <!-- Wallets tab -->
  <div id="tab-wallets" class="tab-panel active">
    <div id="walletList"></div>
  </div>

  <!-- Timeline tab -->
  <div id="tab-transactions" class="tab-panel">
    <div class="empty-state" style="margin-top:40px">
      <div class="icon">💳</div>
      Coming soon — timeline view
    </div>
  </div>

  <!-- More tab -->
  <div id="tab-more" class="tab-panel">
    <p class="more-section-title">Manage</p>
    <div class="more-menu-item" onclick="openMorePanel('wallets')">
      <div class="more-menu-icon" style="background:rgba(139,92,246,0.14)">👛</div>
      <div class="more-menu-info">
        <div class="more-menu-name">Wallets</div>
        <div class="more-menu-meta" id="moreWalletsMeta">—</div>
      </div>
      <span class="more-menu-chevron">&#8250;</span>
    </div>
    <div class="more-menu-item" onclick="openMorePanel('categories')">
      <div class="more-menu-icon" style="background:rgba(34,197,94,0.12)">🏷️</div>
      <div class="more-menu-info">
        <div class="more-menu-name">Categories</div>
        <div class="more-menu-meta" id="moreCatsMeta">—</div>
      </div>
      <span class="more-menu-chevron">&#8250;</span>
    </div>
    <div class="more-menu-item" onclick="openMorePanel('labels')">
      <div class="more-menu-icon" style="background:rgba(59,130,246,0.12)">🔖</div>
      <div class="more-menu-info">
        <div class="more-menu-name">Labels</div>
        <div class="more-menu-meta" id="moreLabelsMeta">—</div>
      </div>
      <span class="more-menu-chevron">&#8250;</span>
    </div>
  </div>

</div>

<!-- Bottom nav -->
<nav class="tab-bar">
  <button class="tab-btn" onclick="switchTab('overview',this)">
    <span class="tab-icon">🏠</span><span>Overview</span>
  </button>
  <button class="tab-btn active" onclick="switchTab('wallets',this)">
    <span class="tab-icon">👛</span><span>Wallets</span>
  </button>
  <button class="tab-btn" onclick="switchTab('transactions',this)">
    <span class="tab-icon">💳</span><span>Timeline</span>
  </button>
  <button class="tab-btn" onclick="switchTab('more',this)">
    <span class="tab-icon">&#8943;</span><span>More</span>
  </button>
</nav>

<!-- Wallet Panel (full-screen) -->
<div id="walletPanel" style="display:none;position:fixed;inset:0;z-index:150;background:var(--bg);overflow-y:auto;padding-bottom:88px">
  <nav class="back-bar">
    <button onclick="closeWalletPanel()" class="back-link" style="background:none;border:none;cursor:pointer">&#8592; Back</button>
    <span class="back-bar-title" id="walletPanelName">Wallet</span>
    <div style="position:relative">
      <button id="walletPanelMenuBtn" onclick="toggleWalletPanelMenu(event)" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.3rem;padding:6px 10px;border-radius:6px;line-height:1;font-family:inherit;transition:color 0.15s" title="Options">&#8942;</button>
      <div id="walletPanelMenu" style="display:none;position:absolute;right:0;top:calc(100% + 4px);background:var(--surface);border:1px solid var(--border);border-radius:10px;min-width:160px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,0.5);z-index:10">
        <button onclick="deleteActiveWallet()" style="width:100%;padding:13px 16px;background:none;border:none;color:var(--red);font-size:0.88rem;cursor:pointer;text-align:left;font-family:inherit;display:flex;align-items:center;gap:8px">&#128465; Delete Wallet</button>
      </div>
    </div>
  </nav>
  <div style="max-width:480px;margin:0 auto;padding:12px 16px 0">
    <div id="walletPanelSummary"></div>
    <div id="walletPanelTxns"></div>
  </div>
  <button class="fab" onclick="openTxnModalFromPanel()" title="Add Transaction">+</button>
</div>

<!-- Add Transaction Modal -->
<div class="modal-backdrop" id="txnModal" onclick="handleModalBackdropClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Add Transaction</div>

    <div class="type-toggle">
      <button class="type-toggle-btn active-expense" id="btnExpense" onclick="setTxnType('expense')">&#8595; Expense</button>
      <button class="type-toggle-btn" id="btnIncome" onclick="setTxnType('income')">&#8593; Income</button>
    </div>

    <div class="amount-input-wrap">
      <span class="amount-currency" id="modalCurrencySymbol">&#8377;</span>
      <input type="number" class="amount-input" id="txnAmount" placeholder="0.00" min="0" step="0.01" />
    </div>

    <div class="field">
      <label>Category</label>
      <div class="cat-grid" id="catGrid"></div>
    </div>

    <div class="form-row">
      <div class="field">
        <label>Wallet</label>
        <select id="txnWallet" onchange="updateModalCurrencySymbol()"></select>
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="txnDate" />
      </div>
    </div>

    <div class="field">
      <label>Note (optional)</label>
      <input type="text" id="txnNote" placeholder="What was this for?" maxlength="80" />
    </div>

    <button class="btn-primary" id="saveTxnBtn" onclick="saveTxn()">Save Transaction</button>
    <button onclick="closeTxnModal()" style="width:100%;margin-top:8px;padding:10px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.88rem;font-family:inherit;">Cancel</button>
  </div>
</div>

<!-- Transaction Detail Modal -->
<div class="modal-backdrop" id="txnDetailModal" onclick="if(event.target===this)closeTxnDetail()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div id="txnDetailContent"></div>
    <button class="btn-danger" id="txnDetailDelBtn">&#128465; Delete Transaction</button>
    <button class="btn-cancel-link" onclick="closeTxnDetail()">Close</button>
  </div>
</div>

<!-- More Sub-Panel (full-screen, opens from More tab) -->
<div id="moreSubPanel" style="display:none;position:fixed;inset:0;z-index:150;background:var(--bg);overflow-y:auto;padding-bottom:88px">
  <nav class="back-bar">
    <button onclick="closeMorePanel()" class="back-link" style="background:none;border:none;cursor:pointer">&#8592; Back</button>
    <span class="back-bar-title" id="moreSubPanelTitle">—</span>
    <div style="width:60px"></div>
  </nav>
  <div style="max-width:480px;margin:0 auto;padding:12px 16px 0" id="moreSubPanelContent"></div>
</div>

<script src="config.js"></script>
<script>
  const token    = localStorage.getItem('auth_token');
  const API_BASE = window.API_BASE || '';

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
  }

  /* ── Categories ── */
  const CATEGORIES = {
    expense: [
      { id: 'food',          name: 'Food',        icon: '🍔', color: '#f97316' },
      { id: 'shopping',      name: 'Shopping',    icon: '🛍️', color: '#ec4899' },
      { id: 'transport',     name: 'Transport',   icon: '🚗', color: '#3b82f6' },
      { id: 'bills',         name: 'Bills',       icon: '💡', color: '#eab308' },
      { id: 'health',        name: 'Health',      icon: '🏥', color: '#22c55e' },
      { id: 'entertainment', name: 'Fun',         icon: '🎮', color: '#a855f7' },
      { id: 'travel',        name: 'Travel',      icon: '✈️', color: '#06b6d4' },
      { id: 'housing',       name: 'Housing',     icon: '🏠', color: '#8b5cf6' },
      { id: 'personal',      name: 'Personal',    icon: '💊', color: '#f43f5e' },
      { id: 'education',     name: 'Education',   icon: '📚', color: '#0ea5e9' },
      { id: 'gifts',         name: 'Gifts',       icon: '🎁', color: '#d97706' },
      { id: 'other-exp',     name: 'Other',       icon: '📦', color: '#6b7280' },
    ],
    income: [
      { id: 'salary',    name: 'Salary',     icon: '💼', color: '#22c55e' },
      { id: 'freelance', name: 'Freelance',  icon: '💻', color: '#3b82f6' },
      { id: 'invest',    name: 'Investment', icon: '📈', color: '#8b5cf6' },
      { id: 'gift-in',   name: 'Gift',       icon: '🎁', color: '#f59e0b' },
      { id: 'other-inc', name: 'Other',      icon: '💰', color: '#6b7280' },
    ]
  };

  const WALLET_ICONS    = { bank:'🏦', cash:'💵', credit:'💳', savings:'🐖', investment:'📈', other:'📦' };
  const WALLET_COLORS   = ['#8b5cf6','#3b82f6','#22c55e','#f59e0b','#ef4444','#ec4899','#14b8a6','#f97316'];
  const CURRENCY_SYMBOL = { INR:'₹', AED:'AED ', USD:'$' };

  const ICON_OPTIONS = [
    // People & Family
    '👨','👩','🧒','👦','👧','👶','🧑','👴','👵','👨‍👩‍👧','👨‍👩‍👦','👪','🤱','🧒‍♂️','🧒‍♀️',
    // Food & Drink
    '🍔','🍕','🌮','🍜','🍣','🥗','☕','🍺','🍷','🧃','🍩','🎂','🥘','🍱',
    // Shopping & Style
    '🛍️','👗','👟','👜','🛒','💄','🧴','🎀','👒','🧢','👞','💍',
    // Transport
    '🚗','🚌','✈️','🚂','🚕','🛵','🚲','⛽','🚢','🏍️','🚁','🛺',
    // Home & Bills
    '💡','📱','🌐','💧','🔌','🏠','🛋️','🔑','🧹','📺','🪣','🧺',
    // Health & Wellness
    '💊','🏥','🧬','🏋️','🧘','🩺','🌡️','🦷','🧴','🩹',
    // Entertainment & Fun
    '🎮','🎬','🎵','🎭','🎯','📷','🎲','🎸','🎡','🎪',
    // Travel
    '🏖️','🏔️','🧳','🗺️','🏕️','⛺','🗼','🏛️',
    // Finance
    '💳','💰','📊','📈','🏦','💎','🪙','💵',
    // Personal & Education
    '💈','💅','👔','🪞','🎓','✂️','📚','✏️',
    // Nature & Misc
    '🐾','🌱','🎨','🪴','🌸','🐕','⚡','🎁','🌍','🍀','🌙','☀️','❄️','🔥',
  ];

  /* ── State ── */
  let _wallets = [], _transactions = [];
  let _viewYear = new Date().getFullYear(), _viewMonth = new Date().getMonth();
  let _txnType = 'expense', _selectedCat = null, _selectedColor = WALLET_COLORS[0];
  let _customCategories = JSON.parse(localStorage.getItem('funds_custom_cats') || '[]');
  let _selectedCatIcon  = ICON_OPTIONS[0];
  let _selectedCatColor = WALLET_COLORS[0];
  let _catFormType      = 'expense';
  let _activeWalletId   = null;

  /* ── Utilities ── */
  function getCategory(id) {
    return [...CATEGORIES.expense, ...CATEGORIES.income, ..._customCategories].find(c => c.id === id) || { id, name: id, icon: '📦', color: '#6b7280' };
  }
  function getWallet(id) { return _wallets.find(w => w.id === id); }
  function sym(currency) { return CURRENCY_SYMBOL[currency] || currency + ' '; }
  function fmt(amount, currency) { return sym(currency || 'INR') + Math.abs(amount).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmtShort(amount, currency) { return sym(currency || 'INR') + Math.abs(amount).toLocaleString('en-IN', { maximumFractionDigits: 0 }); }
  function fmtDate(iso) { return new Date(iso + 'T00:00:00').toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }); }
  function fmtMonthYear(y, m) { return new Date(y, m, 1).toLocaleDateString('en-IN', { month: 'long', year: 'numeric' }); }
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function getWalletBalance(w) {
    const t = _transactions.filter(t => t.walletId === w.id);
    return (w.initialBalance || 0) + t.filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0) - t.filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0);
  }
  function getMonthTxns(y, m) {
    return _transactions.filter(t => { const d = new Date(t.date + 'T00:00:00'); return d.getFullYear() === y && d.getMonth() === m; });
  }

  /* ── Month nav ── */
  function shiftMonth(delta) {
    _viewMonth += delta;
    if (_viewMonth > 11) { _viewMonth = 0; _viewYear++; }
    if (_viewMonth < 0)  { _viewMonth = 11; _viewYear--; }
    renderAll();
  }

  /* ── Tab switching ── */
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }


  /* ── API ── */
  async function fetchData() {
    const res = await fetch(API_BASE + '/api/funds', { headers: authHeaders() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to load');
    _wallets      = data.wallets      || [];
    _transactions = data.transactions || [];
  }
  async function apiAddWallet(w) {
    const res = await fetch(API_BASE + '/api/funds/wallets', { method: 'POST', headers: authHeaders(), body: JSON.stringify(w) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    return data.wallet;
  }
  async function apiDeleteWallet(id) {
    const res = await fetch(API_BASE + '/api/funds/wallets/' + id, { method: 'DELETE', headers: authHeaders() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
  }
  async function apiAddTxn(t) {
    const res = await fetch(API_BASE + '/api/funds/transactions', { method: 'POST', headers: authHeaders(), body: JSON.stringify(t) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    return data.transaction;
  }
  async function apiDeleteTxn(id) {
    const res = await fetch(API_BASE + '/api/funds/transactions/' + id, { method: 'DELETE', headers: authHeaders() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
  }

  /* ── Shared transaction list renderer ── */
  function renderTxnList(txns) {
    if (!txns.length) return '<div class="empty-state"><div class="icon">💸</div>No transactions found.<br>Tap + to add one.</div>';
    const grouped = {};
    txns.forEach(t => { (grouped[t.date] = grouped[t.date] || []).push(t); });
    const dates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));
    let html = '';
    dates.forEach(date => {
      html += `<div class="txn-group"><div class="txn-date-label">${fmtDate(date)}</div>`;
      grouped[date].forEach(t => {
        const cat    = getCategory(t.categoryId);
        const wallet = getWallet(t.walletId);
        const sign   = t.type === 'income' ? '+' : '-';
        html += `<div class="txn-row" onclick="openTxnDetail(${t.id})">
          <div class="txn-cat-icon" style="background:${cat.color}22">${cat.icon}</div>
          <div class="txn-info">
            <div class="txn-title">${escapeHtml(t.note || cat.name)}</div>
            <div class="txn-sub">${escapeHtml(cat.name)}${wallet ? ' · ' + escapeHtml(wallet.name) : ''}</div>
          </div>
          <span class="txn-amount ${t.type}">${sign}${fmt(t.amount, wallet?.currency)}</span>
          <span class="txn-chevron">&#8250;</span>
        </div>`;
      });
      html += '</div>';
    });
    return html;
  }

  /* ── Render wallet list ── */
  function renderWalletList() {
    const el = document.getElementById('walletList');
    let html = '';
    if (!_wallets.length) {
      html += '<div class="empty-state" style="margin-bottom:16px"><div class="icon">🏦</div>No wallets yet.<br>Add your first wallet below.</div>';
    } else {
      html += _wallets.map(w => {
        const bal = getWalletBalance(w);
        return `<div class="wallet-list-item" onclick="openWalletPanel(${w.id})">
          <div class="wallet-list-icon" style="background:${w.color}22">${WALLET_ICONS[w.type] || '📦'}</div>
          <div class="wallet-list-info">
            <div class="wallet-list-name">${escapeHtml(w.name)}</div>
            <div class="wallet-list-meta">${w.currency} · ${w.type}</div>
          </div>
          <div class="wallet-list-balance" style="color:${w.color}">${fmt(bal, w.currency)}</div>
          <span class="wallet-chevron">&#8250;</span>
        </div>`;
      }).join('');
    }
    el.innerHTML = html;
  }

  /* ── Color picker ── */
  function initColorPicker() {
    const el = document.getElementById('colorPicker');
    if (!el) return;
    el.innerHTML = WALLET_COLORS.map(c =>
      `<div class="color-swatch ${c === _selectedColor ? 'selected' : ''}" style="background:${c}" onclick="selectColor('${c}')"></div>`
    ).join('');
  }
  function selectColor(color) { _selectedColor = color; initColorPicker(); }

  /* ── Add wallet (called from More > Wallets panel) ── */
  async function addWallet() {
    const name = document.getElementById('wName').value.trim();
    if (!name) { alert('Please enter a wallet name.'); return; }
    const btn = document.getElementById('addWalletBtn');
    btn.disabled = true; btn.textContent = 'Adding…';
    try {
      await apiAddWallet({ name, type: document.getElementById('wType').value, currency: document.getElementById('wCurrency').value, color: _selectedColor, initialBalance: parseFloat(document.getElementById('wBalance').value) || 0 });
      await fetchData();
      document.getElementById('wName').value = '';
      document.getElementById('wBalance').value = '';
      _selectedColor = WALLET_COLORS[0];
      initColorPicker();
      renderMoreWalletList();
      renderWalletList();
      renderMoreMenu();
    } catch (err) { alert('Error: ' + err.message); }
    finally { btn.disabled = false; btn.textContent = '+ Add Wallet'; }
  }

  /* ── Delete wallet from More panel ── */
  async function deleteWalletFromMore(id) {
    const w = getWallet(id);
    if (!confirm(`Delete "${w?.name}"? All transactions in this wallet will also be removed.`)) return;
    try { await apiDeleteWallet(id); await fetchData(); renderMoreWalletList(); renderWalletList(); renderMoreMenu(); }
    catch (err) { alert('Error: ' + err.message); }
  }

  /* ── Transaction modal ── */
  function openTxnModal(preSelectedWalletId) {
    if (!_wallets.length) { alert('Please add a wallet first.'); return; }
    document.getElementById('txnAmount').value = '';
    document.getElementById('txnNote').value   = '';
    document.getElementById('txnDate').value   = new Date().toISOString().slice(0, 10);
    _selectedCat = null; _txnType = 'expense';
    updateTxnTypeUI(); renderCatGrid();
    document.getElementById('txnWallet').innerHTML = _wallets.map(w =>
      `<option value="${w.id}" ${w.id === preSelectedWalletId ? 'selected' : ''}>${WALLET_ICONS[w.type] || '📦'} ${escapeHtml(w.name)} (${w.currency})</option>`
    ).join('');
    updateModalCurrencySymbol();
    document.getElementById('txnModal').classList.add('open');
  }
  function openTxnModalFromPanel() { openTxnModal(_activeWalletId); }
  function closeTxnModal() { document.getElementById('txnModal').classList.remove('open'); }
  function handleModalBackdropClick(e) { if (e.target === e.currentTarget) closeTxnModal(); }

  function setTxnType(type) { _txnType = type; _selectedCat = null; updateTxnTypeUI(); renderCatGrid(); }
  function updateTxnTypeUI() {
    document.getElementById('btnExpense').className = 'type-toggle-btn' + (_txnType === 'expense' ? ' active-expense' : '');
    document.getElementById('btnIncome').className  = 'type-toggle-btn' + (_txnType === 'income'  ? ' active-income'  : '');
  }
  function renderCatGrid() {
    const typedCustom = _customCategories.filter(c => c.type === _txnType);
    const cats = typedCustom.length ? typedCustom : [];
    const el = document.getElementById('catGrid');
    if (!cats.length) {
      el.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:16px 8px;color:var(--muted);font-size:0.8rem;line-height:1.5">
        No ${_txnType} categories yet.<br>Go to the <strong style="color:var(--accent)">Categories</strong> tab to add some.
      </div>`;
      return;
    }
    el.innerHTML = cats.map(c =>
      `<button class="cat-pick ${_selectedCat === c.id ? 'selected' : ''}" onclick="selectCat('${escapeHtml(c.id)}')">
        <span class="cat-pick-icon">${c.icon}</span>
        <span class="cat-pick-name">${escapeHtml(c.name)}</span>
      </button>`
    ).join('');
  }
  function selectCat(id) { _selectedCat = id; renderCatGrid(); }
  function updateModalCurrencySymbol() {
    const w = getWallet(parseInt(document.getElementById('txnWallet').value));
    document.getElementById('modalCurrencySymbol').textContent = sym(w?.currency || 'INR');
  }

  /* ── Save transaction ── */
  async function saveTxn() {
    const amount   = parseFloat(document.getElementById('txnAmount').value);
    const walletId = parseInt(document.getElementById('txnWallet').value);
    const date     = document.getElementById('txnDate').value;
    const note     = document.getElementById('txnNote').value.trim();
    if (!amount || amount <= 0) { alert('Please enter a valid amount.'); return; }
    if (!_selectedCat) { alert('Please select a category.'); return; }
    if (!date) { alert('Please select a date.'); return; }
    const btn = document.getElementById('saveTxnBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      await apiAddTxn({ date, amount, type: _txnType, categoryId: _selectedCat, walletId, note });
      await fetchData(); closeTxnModal();
      if (_activeWalletId) renderWalletPanel(); else renderAll();
    } catch (err) { alert('Error: ' + err.message); }
    finally { btn.disabled = false; btn.textContent = 'Save Transaction'; }
  }

  /* ── Transaction detail ── */
  function openTxnDetail(id) {
    const t      = _transactions.find(x => x.id === id);
    if (!t) return;
    const cat    = getCategory(t.categoryId);
    const wallet = getWallet(t.walletId);
    const sign   = t.type === 'income' ? '+' : '-';
    const color  = t.type === 'income' ? 'var(--green)' : 'var(--red)';
    document.getElementById('txnDetailContent').innerHTML = `
      <div class="detail-icon-wrap" style="background:${cat.color}22">${cat.icon}</div>
      <div class="detail-amount" style="color:${color}">${sign}${fmt(t.amount, wallet?.currency)}</div>
      <div class="detail-meta">${escapeHtml(t.note || cat.name)}</div>
      <div class="detail-rows">
        <div class="detail-row"><span class="detail-row-label">Category</span><span class="detail-row-value">${cat.icon} ${escapeHtml(cat.name)}</span></div>
        <div class="detail-row"><span class="detail-row-label">Wallet</span><span class="detail-row-value">${wallet ? escapeHtml(wallet.name) : '—'}</span></div>
        <div class="detail-row"><span class="detail-row-label">Date</span><span class="detail-row-value">${fmtDate(t.date)}</span></div>
        <div class="detail-row"><span class="detail-row-label">Type</span><span class="detail-row-value" style="text-transform:capitalize">${t.type}</span></div>
        ${t.note ? `<div class="detail-row"><span class="detail-row-label">Note</span><span class="detail-row-value">${escapeHtml(t.note)}</span></div>` : ''}
      </div>`;
    document.getElementById('txnDetailDelBtn').onclick = () => deleteTxnFromDetail(id);
    document.getElementById('txnDetailModal').classList.add('open');
  }
  function closeTxnDetail() { document.getElementById('txnDetailModal').classList.remove('open'); }
  async function deleteTxnFromDetail(id) {
    if (!confirm('Delete this transaction?')) return;
    try {
      await apiDeleteTxn(id); await fetchData(); closeTxnDetail();
      if (_activeWalletId) renderWalletPanel(); else renderAll();
    } catch (err) { alert('Error: ' + err.message); }
  }

  /* ── Wallet panel ── */
  function openWalletPanel(id) {
    _activeWalletId = id;
    renderWalletPanel();
    document.getElementById('walletPanel').style.display = 'block';
    document.body.style.overflow = 'hidden';
  }
  function closeWalletPanel() {
    document.getElementById('walletPanel').style.display = 'none';
    document.body.style.overflow = '';
    _activeWalletId = null;
    closeWalletPanelMenu();
  }
  function toggleWalletPanelMenu(e) {
    e.stopPropagation();
    const menu = document.getElementById('walletPanelMenu');
    menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
  }
  function closeWalletPanelMenu() {
    document.getElementById('walletPanelMenu').style.display = 'none';
  }
  function renderWalletPanel() {
    const w = getWallet(_activeWalletId);
    if (!w) return;
    const bal = getWalletBalance(w);
    const walletTxns = _transactions.filter(t => t.walletId === w.id);
    const monthTxns  = getMonthTxns(_viewYear, _viewMonth).filter(t => t.walletId === w.id);
    const income  = monthTxns.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expense = monthTxns.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    document.getElementById('walletPanelName').textContent = w.name;
    document.getElementById('walletPanelSummary').innerHTML = `
      <div style="background:linear-gradient(135deg,#1e1b4b,#1a1d27);border:1px solid ${w.color}44;border-radius:16px;padding:20px 16px;margin-bottom:16px;text-align:center">
        <div style="font-size:2rem;margin-bottom:6px">${WALLET_ICONS[w.type] || '📦'}</div>
        <div style="font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px">Current Balance</div>
        <div style="font-size:2.2rem;font-weight:800;color:${w.color};font-variant-numeric:tabular-nums;letter-spacing:-0.02em">${fmt(bal, w.currency)}</div>
        <div style="font-size:0.7rem;color:var(--muted);margin:4px 0 12px">${fmtMonthYear(_viewYear, _viewMonth)}</div>
        <div style="display:flex;gap:8px">
          <div style="flex:1;background:rgba(34,197,94,0.08);border-radius:8px;padding:8px 10px">
            <div style="font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px">Income</div>
            <div style="font-size:0.92rem;font-weight:700;color:var(--green)">${fmtShort(income, w.currency)}</div>
          </div>
          <div style="flex:1;background:rgba(239,68,68,0.08);border-radius:8px;padding:8px 10px">
            <div style="font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px">Expenses</div>
            <div style="font-size:0.92rem;font-weight:700;color:var(--red)">${fmtShort(expense, w.currency)}</div>
          </div>
        </div>
      </div>`;
    const sorted = walletTxns.slice().sort((a, b) => b.date.localeCompare(a.date));
    document.getElementById('walletPanelTxns').innerHTML =
      sorted.length ? renderTxnList(sorted) : '<div class="empty-state"><div class="icon">💸</div>No transactions yet.<br>Tap + to add one.</div>';
  }
  async function deleteActiveWallet() {
    closeWalletPanelMenu();
    const w = getWallet(_activeWalletId);
    if (!confirm(`Delete "${w?.name}"? All transactions in this wallet will also be removed.`)) return;
    try { await apiDeleteWallet(_activeWalletId); await fetchData(); closeWalletPanel(); renderWalletList(); renderMoreMenu(); }
    catch (err) { alert('Error: ' + err.message); }
  }

  /* ── Category form type toggle ── */
  function setCatFormType(type) {
    _catFormType = type;
    document.getElementById('catFormBtnExpense').className = 'type-toggle-btn' + (type === 'expense' ? ' active-expense' : '');
    document.getElementById('catFormBtnIncome').className  = 'type-toggle-btn' + (type === 'income'  ? ' active-income'  : '');
  }

  /* ── Custom category icon/color pickers ── */
  function initCatIconPicker() {
    const el = document.getElementById('catIconPicker');
    if (!el) return;
    el.innerHTML = ICON_OPTIONS.map(ic =>
      `<button class="icon-pick ${ic === _selectedCatIcon ? 'selected' : ''}" onclick="selectCatIcon('${ic}')" title="${ic}">${ic}</button>`
    ).join('');
  }
  function selectCatIcon(icon) { _selectedCatIcon = icon; initCatIconPicker(); }

  function initCatColorPicker() {
    const el = document.getElementById('catColorPicker');
    if (!el) return;
    el.innerHTML = WALLET_COLORS.map(c =>
      `<div class="color-swatch ${c === _selectedCatColor ? 'selected' : ''}" style="background:${c}" onclick="selectCatColor('${c}')"></div>`
    ).join('');
  }
  function selectCatColor(color) { _selectedCatColor = color; initCatColorPicker(); }

  /* ── Render categories tab ── */
  function renderCategoriesTab() {
    const el = document.getElementById('customCatList');
    const expenses = _customCategories.filter(c => c.type === 'expense');
    const incomes  = _customCategories.filter(c => c.type === 'income');
    if (!_customCategories.length) {
      el.innerHTML = '<div class="empty-state" style="margin-bottom:16px"><div class="icon">🏷️</div>No custom categories yet.<br>Add one below.</div>';
      return;
    }
    function renderGroup(list, startOffset) {
      return list.map((c, i) => {
        const globalIdx = _customCategories.indexOf(c);
        return `<div class="custom-cat-item">
          <button class="custom-cat-del" onclick="deleteCustomCat(${globalIdx})" title="Delete">&#10005;</button>
          <div style="background:${c.color}22;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem">${c.icon}</div>
          <span class="ci-name">${escapeHtml(c.name)}</span>
        </div>`;
      }).join('');
    }
    let html = '';
    if (expenses.length) {
      html += '<p class="section-title">Expense Categories</p><div class="custom-cat-grid">' + renderGroup(expenses) + '</div>';
    }
    if (incomes.length) {
      html += '<p class="section-title">Income Categories</p><div class="custom-cat-grid">' + renderGroup(incomes) + '</div>';
    }
    el.innerHTML = html;
  }

  /* ── Add custom category ── */
  function addCustomCat() {
    const name = document.getElementById('catName').value.trim();
    if (!name) { alert('Please enter a category name.'); return; }
    const id = 'custom-' + Date.now();
    _customCategories.push({ id, name, icon: _selectedCatIcon, color: _selectedCatColor, type: _catFormType });
    localStorage.setItem('funds_custom_cats', JSON.stringify(_customCategories));
    document.getElementById('catName').value = '';
    _selectedCatIcon  = ICON_OPTIONS[0];
    _selectedCatColor = WALLET_COLORS[0];
    initCatIconPicker();
    initCatColorPicker();
    renderCategoriesTab();
    renderMoreMenu();
  }

  /* ── Delete custom category ── */
  function deleteCustomCat(i) {
    const c = _customCategories[i];
    if (!confirm(`Delete category "${c?.name}"?`)) return;
    _customCategories.splice(i, 1);
    localStorage.setItem('funds_custom_cats', JSON.stringify(_customCategories));
    renderCategoriesTab();
    renderMoreMenu();
  }

  /* ── Render all ── */
  function renderAll() {
    renderWalletList();
    renderMoreMenu();
  }

  /* ── More menu counts ── */
  function renderMoreMenu() {
    const wEl = document.getElementById('moreWalletsMeta');
    const cEl = document.getElementById('moreCatsMeta');
    const lEl = document.getElementById('moreLabelsMeta');
    if (wEl) wEl.textContent = _wallets.length ? `${_wallets.length} wallet${_wallets.length !== 1 ? 's' : ''}` : 'No wallets yet';
    if (cEl) cEl.textContent = _customCategories.length ? `${_customCategories.length} custom categor${_customCategories.length !== 1 ? 'ies' : 'y'}` : 'No custom categories';
    if (lEl) lEl.textContent = _labels.length ? `${_labels.length} label${_labels.length !== 1 ? 's' : ''}` : 'No labels yet';
  }

  /* ── More sub-panel ── */
  let _moreSection = null;
  function openMorePanel(section) {
    _moreSection = section;
    const titles = { wallets: 'Wallets', categories: 'Categories', labels: 'Labels' };
    document.getElementById('moreSubPanelTitle').textContent = titles[section] || section;
    if (section === 'wallets')    openMoreWalletsPanel();
    else if (section === 'categories') openMoreCatsPanel();
    else if (section === 'labels')     openMoreLabelsPanel();
    document.getElementById('moreSubPanel').style.display = 'block';
    document.body.style.overflow = 'hidden';
  }
  function closeMorePanel() {
    document.getElementById('moreSubPanel').style.display = 'none';
    document.getElementById('moreSubPanelContent').innerHTML = '';
    document.body.style.overflow = '';
    _moreSection = null;
    renderMoreMenu();
  }

  /* ── More > Wallets panel ── */
  function openMoreWalletsPanel() {
    document.getElementById('moreSubPanelContent').innerHTML = `
      <div id="moreWalletList"></div>
      <div class="add-wallet-card" style="margin-top:4px">
        <div class="add-wallet-title">Add New Wallet</div>
        <div class="field">
          <label>Wallet Name</label>
          <input type="text" id="wName" placeholder="e.g. HDFC Bank" maxlength="30" />
        </div>
        <div class="form-row">
          <div class="field">
            <label>Type</label>
            <select id="wType">
              <option value="bank">&#127982; Bank Account</option>
              <option value="cash">&#128181; Cash</option>
              <option value="credit">&#128179; Credit Card</option>
              <option value="savings">&#129312; Savings</option>
              <option value="investment">&#128200; Investment</option>
              <option value="other">&#128230; Other</option>
            </select>
          </div>
          <div class="field">
            <label>Currency</label>
            <select id="wCurrency">
              <option value="INR">&#8377; INR</option>
              <option value="AED">AED</option>
              <option value="USD">$ USD</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Initial Balance</label>
          <input type="number" id="wBalance" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="field">
          <label>Color</label>
          <div class="color-row" id="colorPicker"></div>
        </div>
        <button class="btn-primary" id="addWalletBtn" onclick="addWallet()">+ Add Wallet</button>
      </div>`;
    _selectedColor = WALLET_COLORS[0];
    initColorPicker();
    renderMoreWalletList();
  }
  function renderMoreWalletList() {
    const el = document.getElementById('moreWalletList');
    if (!el) return;
    if (!_wallets.length) {
      el.innerHTML = '<div class="empty-state" style="margin-bottom:16px"><div class="icon">🏦</div>No wallets yet.<br>Add one below.</div>';
      return;
    }
    el.innerHTML = _wallets.map(w => {
      const bal = getWalletBalance(w);
      return `<div class="wallet-list-item">
        <div class="wallet-list-icon" style="background:${w.color}22">${WALLET_ICONS[w.type] || '📦'}</div>
        <div class="wallet-list-info">
          <div class="wallet-list-name">${escapeHtml(w.name)}</div>
          <div class="wallet-list-meta">${w.currency} · ${fmt(bal, w.currency)}</div>
        </div>
        <button onclick="deleteWalletFromMore(${w.id})" style="background:none;border:none;color:var(--red);cursor:pointer;padding:6px 10px;border-radius:7px;font-size:0.78rem;font-family:inherit;transition:background 0.15s;flex-shrink:0" onmouseover="this.style.background='rgba(239,68,68,0.1)'" onmouseout="this.style.background='none'">&#128465;</button>
      </div>`;
    }).join('');
  }

  /* ── More > Categories panel ── */
  function openMoreCatsPanel() {
    document.getElementById('moreSubPanelContent').innerHTML = `
      <div id="customCatList"></div>
      <div class="add-wallet-card" style="margin-top:4px">
        <div class="add-wallet-title">Add Custom Category</div>
        <div class="type-toggle" style="margin-bottom:14px">
          <button class="type-toggle-btn active-expense" id="catFormBtnExpense" onclick="setCatFormType('expense')">&#8595; Expense</button>
          <button class="type-toggle-btn" id="catFormBtnIncome" onclick="setCatFormType('income')">&#8593; Income</button>
        </div>
        <div class="field">
          <label>Category Name</label>
          <input type="text" id="catName" placeholder="e.g. Gym" maxlength="20" />
        </div>
        <div class="field">
          <label>Color</label>
          <div class="color-row" id="catColorPicker"></div>
        </div>
        <div class="field">
          <label>Icon</label>
          <div class="icon-grid" id="catIconPicker"></div>
        </div>
        <button class="btn-primary" id="addCatBtn" onclick="addCustomCat()">+ Add Category</button>
      </div>`;
    _selectedCatIcon  = ICON_OPTIONS[0];
    _selectedCatColor = WALLET_COLORS[0];
    _catFormType      = 'expense';
    initCatIconPicker();
    initCatColorPicker();
    renderCategoriesTab();
  }

  /* ── More > Labels panel ── */
  let _labels = JSON.parse(localStorage.getItem('funds_labels') || '[]');
  let _selectedLabelColor = WALLET_COLORS[0];
  function openMoreLabelsPanel() {
    document.getElementById('moreSubPanelContent').innerHTML = `
      <div id="labelList"></div>
      <div class="add-wallet-card" style="margin-top:4px">
        <div class="add-wallet-title">Add Label</div>
        <div class="field">
          <label>Label Name</label>
          <input type="text" id="labelName" placeholder="e.g. Work, Family" maxlength="20" />
        </div>
        <div class="field">
          <label>Color</label>
          <div class="color-row" id="labelColorPicker"></div>
        </div>
        <button class="btn-primary" id="addLabelBtn" onclick="addLabel()">+ Add Label</button>
      </div>`;
    _selectedLabelColor = WALLET_COLORS[0];
    initLabelColorPicker();
    renderLabelList();
  }
  function initLabelColorPicker() {
    const el = document.getElementById('labelColorPicker');
    if (!el) return;
    el.innerHTML = WALLET_COLORS.map(c =>
      `<div class="color-swatch ${c === _selectedLabelColor ? 'selected' : ''}" style="background:${c}" onclick="selectLabelColor('${c}')"></div>`
    ).join('');
  }
  function selectLabelColor(color) { _selectedLabelColor = color; initLabelColorPicker(); }
  function renderLabelList() {
    const el = document.getElementById('labelList');
    if (!el) return;
    if (!_labels.length) {
      el.innerHTML = '<div class="empty-state" style="margin-bottom:16px"><div class="icon">🔖</div>No labels yet.<br>Add one below.</div>';
      return;
    }
    el.innerHTML = '<div class="custom-cat-grid">' + _labels.map((lb, i) =>
      `<div class="custom-cat-item">
        <button class="custom-cat-del" onclick="deleteLabel(${i})" title="Delete">&#10005;</button>
        <div style="background:${lb.color}22;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem">🔖</div>
        <span class="ci-name">${escapeHtml(lb.name)}</span>
      </div>`
    ).join('') + '</div>';
  }
  function addLabel() {
    const name = document.getElementById('labelName').value.trim();
    if (!name) { alert('Please enter a label name.'); return; }
    _labels.push({ id: 'label-' + Date.now(), name, color: _selectedLabelColor });
    localStorage.setItem('funds_labels', JSON.stringify(_labels));
    document.getElementById('labelName').value = '';
    _selectedLabelColor = WALLET_COLORS[0];
    initLabelColorPicker();
    renderLabelList();
    renderMoreMenu();
  }
  function deleteLabel(i) {
    if (!confirm(`Delete label "${_labels[i]?.name}"?`)) return;
    _labels.splice(i, 1);
    localStorage.setItem('funds_labels', JSON.stringify(_labels));
    renderLabelList();
    renderMoreMenu();
  }

  /* ── Init ── */
  document.getElementById('monthLabel').textContent = fmtMonthYear(_viewYear, _viewMonth);
  renderMoreMenu();

  /* Close ⋮ menu when clicking outside */
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#walletPanelMenuBtn') && !e.target.closest('#walletPanelMenu')) {
      closeWalletPanelMenu();
    }
  });

  fetchData().then(() => renderAll()).catch(err => {
    console.error('Failed to load:', err.message);
  });
</script>
<script src="session-guard.js"></script>
</body>
</html>
